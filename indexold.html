<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FormedAndSent</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
  /* ── TOKENS ───────────────────────────────── */
  :root {
    --bg:       #f7f5f0;
    --surface:  #ffffff;
    --border:   #e8e4dc;
    --ink:      #1a1814;
    --ink2:     #6b6560;
    --ink3:     #a09b94;
    --accent:   #2d6a4f;
    --accent2:  #52b788;
    --warn:     #c9592a;
    --radius:   12px;
    --shadow:   0 2px 12px rgba(0,0,0,.07);
    --shadow-lg:0 8px 32px rgba(0,0,0,.10);
    font-family: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); min-height: 100vh; }
  h1,h2,h3 { font-family: 'Lora', serif; }
  a { color: var(--accent); }

  /* ── UTILS ───────────────────────────────── */
  .hidden { display: none !important; }
  .flex    { display: flex; }
  .col     { flex-direction: column; }
  .gap-sm  { gap: 8px; }
  .gap-md  { gap: 16px; }
  .gap-lg  { gap: 24px; }
  .mt-sm   { margin-top: 8px; }
  .mt-md   { margin-top: 16px; }
  .mt-lg   { margin-top: 24px; }
  .center  { align-items: center; justify-content: center; }

  /* ── BUTTONS ─────────────────────────────── */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
         border-radius: 8px; font-size: .9rem; font-weight: 500; cursor: pointer;
         border: none; transition: all .15s; font-family: inherit; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary  { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #235c43; }
  .btn-secondary{ background: var(--surface); color: var(--ink); border: 1.5px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background: var(--bg); }
  .btn-ghost    { background: transparent; color: var(--ink2); border: 1.5px solid var(--border); padding: 7px 14px; font-size: .85rem; }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger   { background: #fdf0ec; color: var(--warn); border: 1.5px solid #f5c9bb; }
  .btn-danger:hover { background: #fbe0d6; }
  .btn-google   { background: #fff; color: #3c4043; border: 1.5px solid #dadce0; font-size: 1rem; padding: 12px 24px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .btn-google:hover { background: #f8f9fa; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
  .btn-icon     { background: transparent; color: var(--ink3); border: none; padding: 4px 8px; cursor: pointer; font-size: 1rem; border-radius: 6px; }
  .btn-icon:hover { background: var(--bg); color: var(--warn); }

  /* ── LANDING ─────────────────────────────── */
  #landing {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(145deg, #e8f4ee 0%, #f7f5f0 50%, #fdf6ee 100%);
  }
  .landing-card {
    background: var(--surface); border-radius: 20px; padding: 56px 64px;
    box-shadow: var(--shadow-lg); text-align: center; max-width: 440px; width: 90%;
    border: 1px solid var(--border);
  }
  .logo-mark {
    width: 56px; height: 56px; background: var(--accent); border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.6rem; margin-bottom: 20px;
  }
  .landing-card h1 { font-size: 2rem; margin-bottom: 8px; }
  .landing-tagline { color: var(--ink2); font-size: 1rem; margin-bottom: 32px; line-height: 1.5; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .signin-hint { font-size: .8rem; color: var(--ink3); margin-top: 16px; }

  /* ── APP SHELL ───────────────────────────── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* Topbar */
  .topbar {
    height: 60px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo { font-family: 'Lora', serif; font-size: 1.1rem; font-weight: 600; color: var(--accent); }
  .topbar-spacer { flex: 1; }
  .topbar-role { font-size: .75rem; background: #e8f4ee; color: var(--accent); padding: 3px 10px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .user-pill { display: flex; align-items: center; gap: 8px; }
  .user-pill img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; background: var(--border); }
  .user-pill span { font-size: .9rem; color: var(--ink2); }

  /* Main layout */
  .app-body { display: flex; flex: 1; }
  .sidebar {
    width: 220px; background: var(--surface); border-right: 1px solid var(--border);
    padding: 24px 12px; display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-radius: 8px; font-size: .9rem; color: var(--ink2); cursor: pointer;
    transition: all .12s; border: none; background: transparent; font-family: inherit; text-align: left; width: 100%;
  }
  .nav-item:hover { background: var(--bg); color: var(--ink); }
  .nav-item.active { background: #e8f4ee; color: var(--accent); font-weight: 600; }
  .nav-section { font-size: .72rem; color: var(--ink3); padding: 12px 14px 4px; text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }
  .main-content { flex: 1; padding: 32px; max-width: 900px; }

  /* ── CARDS & GRIDS ───────────────────────── */
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
  .page-title  { font-size: 1.8rem; margin-bottom: 4px; }
  .page-sub    { color: var(--ink2); font-size: .95rem; }
  .card-grid   { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; transition: box-shadow .15s, transform .15s;
  }
  .card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
  .card-top    { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .tag { font-size: .75rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #e8f4ee; color: var(--accent); }
  .tag.blue { background: #e8f0fb; color: #2563eb; }
  .tag.amber { background: #fef3e2; color: #d97706; }
  .card-title  { font-family: 'Lora', serif; font-size: 1.05rem; margin-bottom: 6px; }
  .card-excerpt{ font-size: .85rem; color: var(--ink2); line-height: 1.5; margin-bottom: 14px; }
  .card-actions{ display: flex; gap: 8px; flex-wrap: wrap; }
  .card-meta   { font-size: .8rem; color: var(--ink3); margin-bottom: 8px; }

  /* ── FORMS ───────────────────────────────── */
  .form-page   { max-width: 680px; }
  .back-btn    { background: none; border: none; color: var(--accent); cursor: pointer; font-size: .9rem; margin-bottom: 20px; padding: 0; font-family: inherit; }
  .back-btn:hover { text-decoration: underline; }
  .field-label { display: block; font-size: .85rem; font-weight: 600; color: var(--ink2); margin-bottom: 6px; margin-top: 20px; }
  .field-label:first-of-type { margin-top: 24px; }
  .field-input, .field-textarea, .field-select {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: .95rem; font-family: inherit; background: var(--surface); color: var(--ink);
    transition: border .15s; outline: none;
  }
  .field-input:focus, .field-textarea:focus, .field-select:focus { border-color: var(--accent); }
  .field-textarea { resize: vertical; line-height: 1.6; }
  .field-hint  { font-size: .8rem; color: var(--ink3); margin-top: 4px; }
  .question-row{ display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .q-num       { font-size: .85rem; color: var(--ink3); min-width: 20px; }
  .q-input     { flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .9rem; font-family: inherit; outline: none; }
  .q-input:focus { border-color: var(--accent); }
  .form-actions{ display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; }
  .class-checkboxes { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
  .class-checkbox { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; transition: border .12s; }
  .class-checkbox:hover { border-color: var(--accent2); }
  .class-checkbox input { accent-color: var(--accent); width: 16px; height: 16px; }
  .class-checkbox label { cursor: pointer; font-size: .92rem; }

  /* ── STUDENT ASSIGNMENT VIEW ─────────────── */
  .assignment-view { max-width: 720px; }
  .progress-bar-wrap { background: var(--border); border-radius: 99px; height: 6px; margin-bottom: 28px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s ease; }
  .passage-box {
    background: #fdfcf8; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px 32px; margin-bottom: 24px; line-height: 1.8; font-family: 'Lora', serif;
    font-size: 1rem; color: var(--ink); max-height: 320px; overflow-y: auto;
  }
  .question-box  { background: var(--surface); border: 1.5px solid var(--accent2); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; }
  .question-label{ font-size: .78rem; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .question-text { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.6; }
  .answer-area   { width: 100%; min-height: 100px; padding: 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .95rem; font-family: inherit; resize: vertical; transition: border .15s; outline: none; }
  .answer-area:focus { border-color: var(--accent); }
  .ai-response {
    background: #f0f7f4; border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0;
    padding: 16px 20px; margin: 16px 0; font-size: .95rem; line-height: 1.7; color: var(--ink);
    animation: fadeIn .3s ease;
  }
  .ai-label { font-size: .75rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .typing-dots span {
    display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
    margin: 0 2px; animation: bounce .9s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .15s; }
  .typing-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .history-item  { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; opacity: .75; }
  .history-q     { font-size: .85rem; color: var(--ink2); margin-bottom: 4px; font-weight: 500; }
  .history-a     { font-size: .9rem; margin-bottom: 8px; }
  .history-ai    { font-size: .85rem; color: var(--accent); font-style: italic; border-left: 2px solid var(--accent2); padding-left: 10px; }

  /* ── COMPLETION ───────────────────────────── */
  .completion-card { text-align: center; max-width: 500px; margin: 60px auto; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; box-shadow: var(--shadow-lg); }
  .completion-icon { font-size: 3rem; margin-bottom: 16px; }
  .completion-card h2 { margin-bottom: 8px; }
  .completion-card p  { color: var(--ink2); line-height: 1.6; margin-bottom: 24px; }

  /* ── RESPONSES TABLE ─────────────────────── */
  .responses-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  .responses-table th { text-align: left; padding: 10px 14px; font-size: .78rem; font-weight: 700; color: var(--ink2); text-transform: uppercase; letter-spacing: .05em; border-bottom: 2px solid var(--border); }
  .responses-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .responses-table tr:last-child td { border-bottom: none; }
  .responses-table tr:hover td { background: var(--bg); }
  .expand-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: .85rem; font-family: inherit; padding: 0; }
  .expand-btn:hover { text-decoration: underline; }

  /* ── EMPTY / LOADING ─────────────────────── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--ink3); }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: .95rem; }
  .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 40px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ───────────────────────────────── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1a1814; color: #fff; padding: 12px 20px; border-radius: 8px;
    font-size: .9rem; z-index: 9999; transition: transform .25s; max-width: 340px; text-align: center;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.error { background: var(--warn); }

  /* ── MODAL ───────────────────────────────── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--surface); border-radius: 16px; padding: 32px; max-width: 560px; width: 100%; box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto; }
  .modal h2 { margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }

  /* ── STUDENT CLASS LIST ───────────────────── */
  .student-home { max-width: 680px; }
  .student-home h1 { margin-bottom: 6px; }
  .welcome-sub { color: var(--ink2); margin-bottom: 28px; }
  .assignment-student-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; transition: box-shadow .15s; }
  .assignment-student-card:hover { box-shadow: var(--shadow); }
  .asc-icon { width: 44px; height: 44px; background: #e8f4ee; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
  .asc-body { flex: 1; }
  .asc-title { font-family: 'Lora', serif; font-size: 1rem; margin-bottom: 3px; }
  .asc-meta { font-size: .82rem; color: var(--ink3); }
  .status-badge { font-size: .75rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .status-badge.done { background: #e8f4ee; color: var(--accent); }
  .status-badge.todo { background: #fef3e2; color: #d97706; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .main-content { padding: 20px 16px; }
    .landing-card { padding: 36px 24px; }
    .passage-box { padding: 18px; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     LANDING
═══════════════════════════════════════ -->
<div id="landing"> 
  <div class="landing-card">
    <div class="logo-mark">📖</div>
    <h1>FormedAndSent</h1>
    <p class="landing-tagline">AI-powered reading assignments with personalised Socratic feedback for every student.</p>
    <hr class="divider"/>
    <button class="btn btn-google" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.3 0 6.2 1.2 8.5 3.1l6.3-6.3C34.9 2.9 29.8 1 24 1 14.8 1 7 6.6 3.7 14.4l7.4 5.7C12.7 14 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.6 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.5 2.9-2.2 5.4-4.7 7l7.3 5.7c4.3-4 6.8-9.9 6.8-16.7z" /><path fill="#FBBC05" d="M11.1 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6L2.9 13.7A23 23 0 0 0 1 24c0 3.7.9 7.2 2.5 10.3l7.6-5.7z"/><path fill="#34A853" d="M24 47c6 0 11-2 14.7-5.3l-7.3-5.7c-2 1.4-4.6 2.2-7.4 2.2-6.1 0-11.3-4.1-13.1-9.7L3.3 34c3.2 7.8 11 13 20.7 13z"/></svg>
      Sign in with Google
    </button>
    <p class="signin-hint">Use your school Google account</p>
  </div>
</div>

<!-- ═══════════════════════════════════════
     APP SHELL
═══════════════════════════════════════ -->
<div id="app">
  <!-- Topbar -->
  <header class="topbar">
    <span class="topbar-logo">📖 FormedAndSent</span>
    <span class="topbar-spacer"></span>
    <span class="topbar-role" id="topbar-role">Student</span>
    <div class="user-pill">
      <img id="user-avatar" src="" alt="avatar"/>
      <span id="user-name"></span>
    </div>
    <button class="btn btn-ghost" onclick="signOutUser()" style="padding:6px 12px;font-size:.82rem;">Sign out</button>
  </header>

  <div class="app-body">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar"></nav>
    <!-- Main -->
    <main class="main-content" id="main-content">
      <div class="loading-spinner"></div>
    </main>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ═══════════════════════════════════════
     FIREBASE + APP LOGIC
═══════════════════════════════════════ -->
<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, deleteDoc,
         serverTimestamp, query, where, orderBy }
                                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ─────────────────────────────────────────────
   🔧  CONFIG  — replace before deploying
──────────────────────────────────────────────── */
const firebaseConfig = {
    apiKey: "AIzaSyDpwK7arl0FS6uKnYyAI3O_hgkwM178A9Y",
    authDomain: "formedandsent.firebaseapp.com",
    projectId: "formedandsent",
    storageBucket: "formedandsent.firebasestorage.app",
    messagingSenderId: "1031066699010",
    appId: "1:1031066699010:web:617cb6f11fd5139c35ee1b"
  };
// Your Google Apps Script web app URL (handles Sheets + Classroom)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwHKV-_Un-9xH9c0RRpUdcz7CCsZZYUhnldEgkcJX8bH8rNmT_ZUKdRuYrejhVFGIbbvg/exec";
/* ──────────────────────────────────────────── */

const fbApp  = initializeApp(FIREBASE_CONFIG);
const auth   = getAuth(fbApp);
const db     = getFirestore(fbApp);
const gp     = new GoogleAuthProvider();
gp.addScope("https://www.googleapis.com/auth/classroom.coursework.students");
gp.addScope("https://www.googleapis.com/auth/classroom.courses.readonly");
gp.addScope("https://www.googleapis.com/auth/spreadsheets");

/* ── STATE ───────────────────────────────────── */
let user = null, role = null, gToken = null;
let session = [];       // [{question, answer, feedback}]
let qIndex  = 0;
let curAssignment = null;

/* ── HELPERS ─────────────────────────────────── */
const $  = id => document.getElementById(id);
const mc = () => $("main-content");

function toast(msg, isError=false) {
  const t = $("toast");
  t.textContent = msg;
  t.className = isError ? "error show" : "show";
  setTimeout(() => t.className = "", 3000);
}

/* ── AUTH ────────────────────────────────────── */
window.signIn = async () => {
  try {
    const result = await signInWithPopup(auth, gp);
    gToken = result._tokenResponse?.oauthAccessToken || null;
  } catch(e) { toast(e.message, true); }
};
window.signOutUser = async () => { await signOut(auth); };

onAuthStateChanged(auth, async u => {
  user = u;
  if (!u) { showLanding(); return; }
  const snap = await getDoc(doc(db, "users", u.uid));
  if (snap.exists()) {
    role = snap.data().role;
  } else {
    role = "student";
    await setDoc(doc(db, "users", u.uid), {
      name: u.displayName, email: u.email, role: "student", createdAt: serverTimestamp()
    });
  }
  bootApp();
});

function showLanding() {
  $("landing").style.display = "flex";
  $("app").style.display = "none";
}

function bootApp() {
  $("landing").style.display = "none";
  $("app").style.display = "flex";
  $("user-name").textContent = user.displayName.split(" ")[0];
  $("user-avatar").src = user.photoURL || "";
  $("topbar-role").textContent = role === "teacher" ? "Teacher" : "Student";
  buildSidebar();
  if (role === "teacher") renderTeacherHome();
  else renderStudentHome();
}

/* ── SIDEBAR ─────────────────────────────────── */
function buildSidebar() {
  const sb = $("sidebar");
  if (role === "teacher") {
    sb.innerHTML = `
      <span class="nav-section">Teacher</span>
      <button class="nav-item active" id="nav-assignments" onclick="renderTeacherHome()">📋 Assignments</button>

    <div class="form-page">
      <button class="back-btn" onclick="renderTeacherHome()">← Back to Assignments</button>
      <h1 class="page-title">${id ? "Edit" : "New"} Assignment</h1>

      <label class="field-label">Title *</label>
      <input id="f-title" class="field-input" value="${d.title||""}" placeholder="e.g. The Water Cycle — Reading Response"/>

      <label class="field-label">Subject Tag</label>
      <input id="f-subject" class="field-input" value="${d.subject||""}" placeholder="e.g. Science, English, History…"/>

      <label class="field-label">Reading Passage *</label>
      <textarea id="f-passage" class="field-textarea" rows="9" placeholder="Paste the article or passage here…">${d.passage||""}</textarea>

      <label class="field-label">Questions <span style="color:var(--ink3);font-weight:400">(students answer each in turn)</span></label>
      <div id="q-container">
        ${questions.map((q,i) => questionRow(i,q)).join("")}
      </div>
      <button class="btn btn-ghost mt-sm" onclick="addQuestionRow()">+ Add Question</button>

      <label class="field-label">AI Tutor Persona Instructions</label>
      <textarea id="f-instructions" class="field-textarea" rows="4" placeholder="e.g. Encourage students to quote the text. Never reveal the answer directly. After each response, ask one follow-up that deepens understanding.">${d.instructions||""}</textarea>
      <p class="field-hint">This shapes how the AI responds to each student. You are always the Socratic tutor role.</p>

      <label class="field-label">Post to Google Classroom Classes</label>
      <p class="field-hint" style="margin-bottom:8px">Students will see this assignment appear in their Classroom feed with a link to your site.</p>
      <div class="class-checkboxes" id="class-checks">
        ${classes.length === 0
          ? `<p style="color:var(--ink3);font-size:.85rem">⚠️ No classes found — make sure your Apps Script URL is set and you've granted access.</p>`
          : classes.map(c => `
            <label class="class-checkbox">
              <input type="checkbox" value="${c.id}" data-name="${c.name}" ${(d.classIds||[]).includes(c.id)?"checked":""}/>

            </label>`).join("")}

        <button class="btn btn-secondary" onclick="renderTeacherHome()">Cancel</button>

          ${id ? "Save Changes" : "Publish to Classroom"}

function questionRow(i, val="") {
  return `<div class="question-row" id="qrow-${i}">
    <span class="q-num">${i+1}.</span>
    <input class="q-input" id="q-${i}" value="${val}" placeholder="Question ${i+1}…"/>
    <button class="btn-icon" onclick="removeQuestionRow(${i})" title="Remove">✕</button>
  </div>`;
}

window.addQuestionRow = () => {
  const c = $("q-container");
  const i = c.children.length;
  c.insertAdjacentHTML("beforeend", questionRow(i));
};
window.removeQuestionRow = i => {
  const el = $(`qrow-${i}`); if (el) el.remove();
};

async function fetchTeacherClasses() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.startsWith("REPLACE")) return [];
  try {
    const r = await fetch(`${APPS_SCRIPT_URL}?action=getClasses&token=${encodeURIComponent(gToken||"")}`);
    const j = await r.json();
    return j.classes || [];
  } catch(e) { return []; }
}

window.saveAssignment = async (existingId) => {
  const title   = $("f-title").value.trim();
  const passage = $("f-passage").value.trim();
  if (!title || !passage) { toast("Title and passage are required.", true); return; }

  const qs = Array.from(document.querySelectorAll(".q-input")).map(i=>i.value.trim()).filter(Boolean);
  if (!qs.length) { toast("Add at least one question.", true); return; }

  const checks = document.querySelectorAll('#class-checks input[type=checkbox]:checked');
  const classIds   = Array.from(checks).map(c => c.value);
  const classNames = Array.from(checks).map(c => c.dataset.name);

  const assignmentUrl = window.location.href.split("?")[0];
  const payload = {
    title, passage,
    subject:      $("f-subject").value.trim(),
    questions:    qs,
    instructions: $("f-instructions").value.trim(),
    classIds, classNames,
    teacherId:    user.uid,
    teacherName:  user.displayName,
    updatedAt:    serverTimestamp()
  };

  let docId = existingId;
  if (existingId) {
    await setDoc(doc(db,"assignments",existingId), payload, {merge:true});
  } else {
    payload.createdAt = serverTimestamp();
    const ref = await addDoc(collection(db,"assignments"), payload);
    docId = ref.id;
  }

  // Post to Google Classroom via Apps Script
  if (classIds.length && APPS_SCRIPT_URL && !APPS_SCRIPT_URL.startsWith("REPLACE")) {
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          action: "postAssignment",
          token: gToken,
          title, description: `Complete this AI-powered reading assignment: ${assignmentUrl}?a=${docId}`,
          url: `${assignmentUrl}?a=${docId}`,
          classIds
        })
      });
      toast("Assignment published to Google Classroom ✓");
    } catch(e) { toast("Saved, but Classroom post failed: "+e.message, true); }
  } else {
    toast("Assignment saved ✓");
  }
  renderTeacherHome();
};

window.deleteAssignment = async id => {
  if (!confirm("Delete this assignment permanently?")) return;
  await deleteDoc(doc(db,"assignments",id));
  toast("Deleted.");
  renderTeacherHome();
};

window.renderEditAssignment = async id => {
  const snap = await getDoc(doc(db,"assignments",id));
  renderCreateAssignment(id, snap.data());
};

window.exportCSV = async (assignmentId) => {
  const snp = await getDocs(query(collection(db,"responses"), where("assignmentId","==",assignmentId)));

  snp.forEach(d => {
    const r  = d.data();
    const dt = r.submittedAt?.toDate?.()?.toLocaleDateString()||"";
    (r.session||[]).forEach(s => {
      const esc = v => `"${(v||"").replace(/"/g,'""')}"`;
      csv += `${esc(r.studentName)},${esc(r.studentEmail)},${esc(dt)},${esc(s.question)},${esc(s.answer)},${esc(s.feedback)}\n`;
    });
  });
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  a.download = "responses.csv";
  a.click();
};

      <p class="welcome-sub">Your assignments are listed below. Click one to begin.</p>

    </div>`;

      </div>`;
  });

/* ═══════════════════════════════════════════════
   STUDENT — ASSIGNMENT FLOW
═══════════════════════════════════════════════ */
window.renderAssignment = async (assignmentId) => {
  const snap = await getDoc(doc(db,"assignments",assignmentId));
  if (!snap.exists()) { toast("Assignment not found.", true); return; }
  curAssignment = { id: assignmentId, ...snap.data() };
  session   = [];
  qIndex    = 0;
  renderQuestion();
};

function renderQuestion() {
  const a        = curAssignment;
  const total    = a.questions.length;
  const progress = Math.round((qIndex / total) * 100);

  mc().innerHTML = `
    <div class="assignment-view">
      <button class="back-btn" onclick="renderStudentHome()">← Back</button>
      <h2 style="font-family:'Lora',serif;margin-bottom:4px">${a.title}</h2>
      <p style="color:var(--ink3);font-size:.85rem;margin-bottom:16px">Question ${qIndex+1} of ${total}</p>

      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>

      <!-- Past Q&As -->
      <div id="history-container"></div>

      <!-- Passage -->
      <details ${qIndex===0?"open":""}>
        <summary style="cursor:pointer;font-weight:600;font-size:.9rem;color:var(--ink2);margin-bottom:8px;user-select:none">
          📄 Reading Passage ${qIndex>0?"(click to expand)":""}
        </summary>
        <div class="passage-box">${a.passage.replace(/\n/g,"<br/>")}</div>
      </details>

      <!-- Current question -->
      <div class="question-box" style="margin-top:16px">
        <p class="question-label">Question ${qIndex+1}</p>
        <p class="question-text">${a.questions[qIndex]}</p>
      </div>

      <textarea id="student-answer" class="answer-area" placeholder="Type your answer here…"></textarea>

      <div id="ai-feedback-area"></div>

      <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap" id="action-row">
        <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">Submit Answer</button>
      </div>
    </div>`;

  // Render past exchanges
  if (session.length > 0) {
    const hc = $("history-container");
    session.slice(0,-1).forEach((s,i) => {
      hc.innerHTML += `
        <div class="history-item">
          <p class="history-q">Q${i+1}: ${s.question}</p>
          <p class="history-a">Your answer: ${s.answer}</p>
          <p class="history-ai">${s.feedback}</p>
        </div>`;
    });
  }
}

window.submitAnswer = async () => {
  const answer = $("student-answer").value.trim();
  if (!answer) { toast("Please write an answer first.", true); return; }

  $("submit-btn").disabled = true;
  $("student-answer").disabled = true;

  // Show typing indicator
  const fbArea = $("ai-feedback-area");
  fbArea.innerHTML = `<div class="ai-response"><div class="ai-label">Tutor</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`;

  // Get AI feedback
  const feedback = await getAIFeedback(answer);

  fbArea.innerHTML = `<div class="ai-response"><div class="ai-label">Tutor</div><p>${feedback}</p></div>`;

  // Save to session
  session.push({ question: curAssignment.questions[qIndex], answer, feedback });
  qIndex++;

  const total = curAssignment.questions.length;
  const ar = $("action-row");

  if (qIndex < total) {
    ar.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">Next Question →</button>`;
  } else {
    ar.innerHTML = `<button class="btn btn-primary" onclick="completeAssignment()">Complete Assignment ✓</button>`;
  }
};

window.nextQuestion = () => { renderQuestion(); };

async function getAIFeedback(studentAnswer) {
  const a = curAssignment;
  const systemPrompt = `You are a Socratic tutor helping a student understand a reading passage.
Your role: guide through questioning, never give away answers directly.
${a.instructions ? "Additional instructions from the teacher: " + a.instructions : ""}
Be encouraging but intellectually challenging. Keep responses to 3–5 sentences.
After your feedback, always end with a single follow-up question that pushes deeper thinking.`;

  const conversationHistory = session.map(s => [
    { role: "user",      content: `Question: ${s.question}\nMy answer: ${s.answer}` },
    { role: "assistant", content: s.feedback }
  ]).flat();

  conversationHistory.push({
    role: "user",
    content: `Passage:\n${a.passage}\n\nQuestion: ${a.questions[qIndex]}\n\nMy answer: ${studentAnswer}`
  });

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": ANTHROPIC_KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 400,
        system: systemPrompt,
        messages: conversationHistory
      })
    });
    const data = await resp.json();
    return data.content?.[0]?.text || "Thank you for your response. Let's think a little deeper — what evidence from the text supports your answer?";
  } catch(e) {
    return "Great effort! Let's push further — what specific part of the passage supports your answer?";
  }
}

window.completeAssignment = async () => {
  mc().innerHTML = `<div class="loading-spinner" style="margin-top:80px"></div>`;
  const totalQ = curAssignment.questions.length;

  // Save to Firestore
  const responseData = {
    assignmentId:    curAssignment.id,
    assignmentTitle: curAssignment.title,
    studentId:       user.uid,
    studentName:     user.displayName,
    studentEmail:    user.email,
    teacherId:       curAssignment.teacherId,
    session,
    totalQuestions:  totalQ,
    submittedAt:     serverTimestamp()
  };
  const ref = await addDoc(collection(db,"responses"), responseData);

  // Send to Apps Script (Google Sheets + Classroom grade)
  if (APPS_SCRIPT_URL && !APPS_SCRIPT_URL.startsWith("REPLACE")) {
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          action:          "saveResponse",
          assignmentTitle: curAssignment.title,
          studentName:     user.displayName,
          studentEmail:    user.email,
          submittedAt:     new Date().toLocaleString(),
          session,
          classIds:        curAssignment.classIds || []
        })
      });
    } catch(e) { console.warn("Sheets sync failed:", e); }
  }

  // Completion screen
  mc().innerHTML = `
    <div class="completion-card">
      <div class="completion-icon">🎉</div>
      <h2>Assignment Complete!</h2>
      <p>Great work on <em>${curAssignment.title}</em>. Your responses have been saved and your teacher has been notified.</p>
      <button class="btn btn-primary" onclick="renderStudentHome()">← Back to My Assignments</button>
    </div>`;
};

/* expose to window for onclick usage */

window.fetchTeacherClasses  = fetchTeacherClasses;
