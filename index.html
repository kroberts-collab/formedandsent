/* ═══════════════════════════════════════════════
   STUDENT — START ASSIGNMENT (with resume check)
═══════════════════════════════════════════════ */
window.startAssignment = async (assignmentId) => {
  const snap = await getDoc(doc(db,"assignments",assignmentId));
  if (!snap.exists()) { toast("Assignment not found.", true); return; }
  curAssignment = { id: assignmentId, ...snap.data() };

  // Check for saved progress
  const saved = await loadProgress(assignmentId);
  if (saved && (saved.session?.length || (saved.journey && saved.journey.storiesCompleted?.length))) {
    showResumePrompt(saved);
    return;
  }

  // Fresh start
  freshStart();
};

function freshStart() {
  session = [];
  qIndex = 0;
  followUpRound = 0;

  if (curAssignment.type === "branching") {
    journey = {
      storiesCompleted:  [],
      branchesCompleted: [],
      branchesCompletedThisStory: 0,
      currentStoryId:    null,
      currentBranchId:   null,
      phase: "story-pick"
    };
    renderStoryPicker();
  } else {
    renderLinearQuestion();
  }
}

function showResumePrompt(saved) {
  const exchangeCount = (saved.session || []).length;
  let detail = "";
  if (curAssignment.type === "branching" && saved.journey) {
    const j = saved.journey;
    const storiesDone = (j.storiesCompleted || []).length;
    const branchesDone = (j.branchesCompleted || []).length;
    detail =`<strong>${storiesDone}</strong> stor${storiesDone===1?'y':'ies'} completed`;
    if (branchesDone > 0) detail +=` · <strong>${branchesDone}</strong> branch${branchesDone>1?'es':''} explored`;
    detail +=` · <strong>${exchangeCount}</strong> answer${exchangeCount===1?'':'s'} saved`;
  } else {
    detail =`You're on question <strong>${(saved.qIndex || 0) + 1}</strong> · <strong>${exchangeCount}</strong> answer${exchangeCount===1?'':'s'} saved`;
  }
  const lastUpdated = saved.lastUpdated?.toDate?.()?.toLocaleString() || "earlier";

  mc().innerHTML = `
    <div class="resume-card">
      <div class="completion-icon">📖</div>
      <h2>Welcome back!</h2>
      <p>You started <em>${escapeHTML(curAssignment.title)}</em> but didn't finish.</p>
      <div class="resume-stats">
        ${detail}<br/>
        <span style="color:var(--ink3);font-size:.82rem">Last saved: ${escapeHTML(lastUpdated)}</span>
      </div>
      <div class="resume-actions">
        <button class="btn btn-primary" onclick="resumeFromSaved()">Resume where I left off</button>
        <button class="btn btn-secondary" onclick="confirmStartOver()">Start over</button>
      </div>
      <p style="margin-top:18px"><button class="back-btn" onclick="renderStudentHome()">← Back to assignments</button></p>
    </div>`;

  // Stash saved for resume
  window._savedProgress = saved;
}

window.resumeFromSaved = () => {
  const saved = window._savedProgress;
  if (!saved) { freshStart(); return; }
  session = saved.session || [];
  qIndex = saved.qIndex || 0;
  followUpRound = saved.followUpRound || 0;
  journey = saved.journey || {};
  window._savedProgress = null;

  if (curAssignment.type === "branching") {
    // Route to the correct phase
    const phase = journey.phase || "story-pick";
    if (phase === "story-questions" && journey.currentStoryId) {
      renderStoryQuestion();
    } else if (phase === "branch-pick" && journey.currentStoryId) {
      renderBranchPicker();
    } else if (phase === "branch-questions" && journey.currentStoryId && journey.currentBranchId) {
      renderBranchQuestion();
    } else {
      renderStoryPicker();
    }
  } else {
    renderLinearQuestion();
  }
  toast("Welcome back! Picking up where you left off.");
};

window.confirmStartOver = async () => {
  if (!confirm("Start over from the beginning? Your saved progress will be erased.")) return;
  await deleteProgress(curAssignment.id);
  window._savedProgress = null;
  freshStart();
};

/* ═══════════════════════════════════════════════
   STUDENT — LINEAR FLOW
═══════════════════════════════════════════════ */
function renderLinearQuestion() {
  const a = curAssignment;
  const total = a.questions.length;
  const progress = Math.round((qIndex / total) * 100);
  followUpRound = 0;
  const q = typeof a.questions[qIndex] === "string"
    ? { text:a.questions[qIndex], maxRounds:5 }
    : a.questions[qIndex];
  MAX_ROUNDS_FOR_Q = q.maxRounds || 5;

  mc().innerHTML = `
    <div class="assignment-view">
      <button class="back-btn" onclick="renderStudentHome()">← Back</button>
      <h2 style="font-family:'Lora',serif;margin-bottom:4px">${escapeHTML(a.title)}</h2>
      <p style="color:var(--ink3);font-size:.85rem;margin-bottom:16px">Question ${qIndex+1} of ${total}</p>

      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>

      <details ${qIndex===0?"open":""}>
        <summary style="cursor:pointer;font-weight:600;font-size:.9rem;color:var(--ink2);margin-bottom:8px;user-select:none">
          📄 Reading Passage ${qIndex>0?"(click to expand)":""}
        </summary>
        <div class="passage-box">${escapeHTML(a.passage).replace(/\n/g,"<br/>")}</div>
      </details>

      <div class="question-box" style="margin-top:16px">
        <p class="question-label">Question ${qIndex+1}</p>
        <p class="question-text">${escapeHTML(q.text)}</p>
      </div>

      <div id="ai-feedback-area"></div>

      <textarea id="student-answer" class="answer-area" placeholder="Type your answer here…"></textarea>

      <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap" id="action-row">
        <button class="btn btn-primary" id="submit-btn" onclick="handleSubmit('first')">Submit Answer</button>
      </div>
    </div>`;
}

window.nextLinearQuestion = () => {
  qIndex++;
  followUpRound = 0;
  if (qIndex >= curAssignment.questions.length) completeAssignment();
  else { renderLinearQuestion(); saveProgress(); }
};

/* ═══════════════════════════════════════════════
   STUDENT — BRANCHING FLOW
═══════════════════════════════════════════════ */
function renderStoryPicker() {
  journey.phase = "story-pick";
  journey.currentStoryId = null;
  journey.currentBranchId = null;
  const a = curAssignment;
  const completed = journey.storiesCompleted.length;
  const required = a.requiredStories || 1;
  const remaining = required - completed;

  let progressMsg = "";
  if (completed === 0) {
    progressMsg =`Choose one of ${a.stories.length} stories to begin. <strong>Complete ${required} stor${required>1?'ies':'y'}</strong> to finish this assignment.`;
  } else if (remaining > 0) {
    progressMsg =`Great work! <strong>${completed} of ${required}</strong> stor${required>1?'ies':'y'} complete. Choose another to continue.`;
  } else {
    progressMsg =`You've completed all required stories! 🎉`;
  }

  const cardsHTML = a.stories.map(s => {
    const done = journey.storiesCompleted.includes(s.id);
    const img  = s.imageUrl ? normaliseImageURL(s.imageUrl) : "";
    const branchCount = (s.branches || []).length;
    const reqBr = s.requiredBranches || 0;
    let metaParts = [`${(s.questions||[]).length} question${(s.questions||[]).length===1?'':'s'}`];
    if (branchCount > 0) {
      if (reqBr > 0) metaParts.push(`+ ${reqBr} of ${branchCount} branch${branchCount>1?'es':''} required`);
      else metaParts.push(`+ ${branchCount} optional branch${branchCount>1?'es':''}`);
    }
    return `
      <div class="story-card ${done?'completed':''}" onclick="${done?'':`pickStory('${s.id}')`}">
        <div class="story-img-wrap" style="position:relative">
          ${img
            ?`<img src="${img}" alt="${escapeHTML(s.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="story-img-placeholder" style="display:none">📖</div>`
            :`<div class="story-img-placeholder">📖</div>`}
          ${done ?`<span class="story-status-badge">✓ Done</span>` : ""}
        </div>
        <div class="story-card-body">
          <p class="story-card-title">${escapeHTML(s.title)}</p>
          <p class="story-card-meta">${metaParts.join(" · ")}</p>
        </div>
      </div>`;
  }).join("");

  mc().innerHTML = `
    <div class="assignment-view">
      <button class="back-btn" onclick="renderStudentHome()">← Back</button>
      <h2 style="font-family:'Lora',serif;margin-bottom:4px">${escapeHTML(a.title)}</h2>
      ${a.intro ?`<p style="color:var(--ink2);margin-bottom:20px;line-height:1.6">${escapeHTML(a.intro)}</p>` : ""}
      <div class="journey-progress">${progressMsg}</div>

      ${remaining <= 0
        ? `<div style="text-align:center;margin:40px 0">
             <button class="btn btn-primary" onclick="completeAssignment()">Finish Assignment ✓</button>
           </div>`
        : ""}

      <h3 style="margin-bottom:14px;font-family:'Lora',serif;font-size:1.15rem">${remaining<=0?"Stories":"Choose Your Story"}</h3>
      <div class="story-grid">${cardsHTML}</div>
    </div>`;

  saveProgress();
}

window.pickStory = (storyId) => {
  const story = curAssignment.stories.find(s => s.id === storyId);
  if (!story) return;
  journey.currentStoryId = storyId;
  journey.phase = "story-questions";
  journey.branchesCompletedThisStory = 0;
  qIndex = 0;
  followUpRound = 0;
  renderStoryQuestion();
  saveProgress();
};

function renderStoryQuestion() {
  const story = curAssignment.stories.find(s => s.id === journey.currentStoryId);
  if (!story) { renderStoryPicker(); return; }
  const total = story.questions.length;

  if (qIndex >= total) {
    // Story base questions finished. If this story has branches, show the picker.
    const hasBranches = (story.branches || []).length > 0;
    if (hasBranches) {
      journey.phase = "branch-pick";
      renderBranchPicker();
    } else {
      finishStory();
    }
    return;
  }

  followUpRound = 0;
  const q = story.questions[qIndex];
  MAX_ROUNDS_FOR_Q = q.maxRounds || 5;
  const progress = Math.round((qIndex / total) * 100);
  const img = story.imageUrl ? normaliseImageURL(story.imageUrl) : "";

  mc().innerHTML = `
    <div class="assignment-view">
      <button class="back-btn" onclick="renderStoryPicker()">← Back to Stories</button>
      <h2 style="font-family:'Lora',serif;margin-bottom:4px">${escapeHTML(story.title)}</h2>
      <p style="color:var(--ink3);font-size:.85rem;margin-bottom:16px">Question ${qIndex+1} of ${total}</p>

      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>

      ${img && qIndex===0 ?`<img src="${img}" alt="" style="width:100%;max-height:280px;object-fit:cover;border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--border)"/>` : ""}

      <details ${qIndex===0?"open":""}>
        <summary style="cursor:pointer;font-weight:600;font-size:.9rem;color:var(--ink2);margin-bottom:8px;user-select:none">
          📄 Story Passage ${qIndex>0?"(click to expand)":""}
        </summary>
        <div class="passage-box">${escapeHTML(story.passage).replace(/\n/g,"<br/>")}</div>
      </details>

      <div class="question-box" style="margin-top:16px">
        <p class="question-label">Question ${qIndex+1}</p>
        <p class="question-text">${escapeHTML(q.text)}</p>
      </div>

      <div id="ai-feedback-area"></div>

      <textarea id="student-answer" class="answer-area" placeholder="Type your answer here…"></textarea>

      <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap" id="action-row">
        <button class="btn btn-primary" id="submit-btn" onclick="handleSubmit('first')">Submit Answer</button>
      </div>
    </div>`;
}

window.nextStoryQuestion = () => {
  qIndex++;
  followUpRound = 0;
  renderStoryQuestion();
  saveProgress();
};

function renderBranchPicker() {
  journey.phase = "branch-pick";
  const a = curAssignment;
  const currentStory = a.stories.find(s => s.id === journey.currentStoryId);
  if (!currentStory) { renderStoryPicker(); return; }

  // ONLY this story's branches
  const availableBranches = currentStory.branches || [];
  const requiredBr = currentStory.requiredBranches || 0;
  const doneCount = journey.branchesCompletedThisStory || 0;
  const remaining = requiredBr - doneCount;
  const branchesOptional = requiredBr === 0;

  let msg = "";
  if (availableBranches.length === 0) {
    msg =`No extra learning paths for this story.`;
  } else if (branchesOptional) {
    if (doneCount === 0) {
      msg =`Nice work on the story! You can <strong>optionally</strong> explore "Learn More" branches below, or finish this story now.`;
    } else {
      msg =`You've explored <strong>${doneCount}</strong> branch${doneCount>1?'es':''}. Pick another or finish this story.`;
    }
  } else if (doneCount === 0) {
    msg =`Now choose what you'd like to <strong>learn more about</strong>. Complete <strong>${requiredBr}</strong> branch${requiredBr>1?'es':''} to finish this story.`;
  } else if (remaining > 0) {
    msg =`Nice! <strong>${doneCount} of ${requiredBr}</strong> done. Pick another.`;
  } else {
    msg =`All required branches complete! 🎉`;
  }

  const branchesDoneSet = new Set(journey.branchesCompleted || []);

  const branchHTML = availableBranches.map(b => {
    const done = branchesDoneSet.has(b.id);
    return `
      <div class="branch-picker-card ${done ? 'completed' : ''}" onclick="${done ? '' : `pickBranch('${b.id}')`}">
        <div class="branch-icon">🔍</div>
        <div class="branch-body">
          <p class="branch-title">${escapeHTML(b.title)}${done ? ' ✓' : ''}</p>
          ${b.description ?`<p class="branch-desc">${escapeHTML(b.description)}</p>` : ""}
        </div>
      </div>`;
  }).join("");

  const canFinishStory = availableBranches.length === 0 || branchesOptional || remaining <= 0;
  const finishBtnLabel = remaining > 0 && branchesOptional
    ? "Skip Branches & Finish Story"
    : "Finish This Story →";

  mc().innerHTML = `
    <div class="assignment-view">
      <button class="back-btn" onclick="renderStoryPicker()">← Back to Stories</button>
      <h2 style="font-family:'Lora',serif;margin-bottom:4px">Learn More: ${escapeHTML(currentStory.title || "")}</h2>
      <div class="journey-progress">${msg}</div>
      ${canFinishStory
        ? `<div style="text-align:center;margin:24px 0">
             <button class="btn ${(remaining<=0||availableBranches.length===0)?'btn-primary':'btn-secondary'}" onclick="finishStory()">
               ${finishBtnLabel}
             </button>
           </div>`
        : ""}
      ${availableBranches.length > 0 ? branchHTML : ""}
    </div>`;

  saveProgress();
}

window.pickBranch = (branchId) => {
  const currentStory = curAssignment.stories.find(s => s.id === journey.currentStoryId);
  const branch = currentStory?.branches?.find(b => b.id === branchId);
  if (!branch) return;
  journey.currentBranchId = branchId;
  journey.phase = "branch-questions";
  qIndex = 0;
  followUpRound = 0;
  renderBranchQuestion();
  saveProgress();
};

function renderBranchQuestion() {
  const currentStory = curAssignment.stories.find(s => s.id === journey.currentStoryId);
  const branch = currentStory?.branches?.find(b => b.id === journey.currentBranchId);
  if (!branch) { renderBranchPicker(); return; }
  const total = branch.questions.length;

  if (qIndex >= total) {
    // Branch done
    if (!journey.branchesCompleted.includes(branch.id)) journey.branchesCompleted.push(branch.id);
    journey.branchesCompletedThisStory = (journey.branchesCompletedThisStory || 0) + 1;
    journey.currentBranchId = null;
    renderBranchPicker();
    saveProgress();
    return;
  }

  followUpRound = 0;
  const q = branch.questions[qIndex];
  MAX_ROUNDS_FOR_Q = q.maxRounds || 5;
  const progress = Math.round((qIndex / total) * 100);

  mc().innerHTML = `
    <div class="assignment-view">
      <button class="back-btn" onclick="renderBranchPicker()">← Back</button>
      <h2 style="font-family:'Lora',serif;margin-bottom:4px">${escapeHTML(branch.title)}</h2>
      <p style="color:var(--ink3);font-size:.85rem;margin-bottom:16px">Question ${qIndex+1} of ${total}</p>

      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>

      <details ${qIndex===0?"open":""}>
        <summary style="cursor:pointer;font-weight:600;font-size:.9rem;color:var(--ink2);margin-bottom:8px;user-select:none">
          📄 Reading ${qIndex>0?"(click to expand)":""}
        </summary>
        <div class="passage-box">${escapeHTML(branch.passage).replace(/\n/g,"<br/>")}</div>
      </details>

      <div class="question-box" style="margin-top:16px">
        <p class="question-label">Question ${qIndex+1}</p>
        <p class="question-text">${escapeHTML(q.text)}</p>
      </div>

      <div id="ai-feedback-area"></div>

      <textarea id="student-answer" class="answer-area" placeholder="Type your answer here…"></textarea>

      <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap" id="action-row">
        <button class="btn btn-primary" id="submit-btn" onclick="handleSubmit('first')">Submit Answer</button>
      </div>
    </div>`;
}

window.nextBranchQuestion = () => {
  qIndex++;
  followUpRound = 0;
  renderBranchQuestion();
  saveProgress();
};

window.finishStory = () => {
  if (!journey.storiesCompleted.includes(journey.currentStoryId)) {
    journey.storiesCompleted.push(journey.currentStoryId);
  }
  journey.currentStoryId = null;
  journey.currentBranchId = null;
  journey.branchesCompletedThisStory = 0;

  if (journey.storiesCompleted.length >= (curAssignment.requiredStories || 1)) {
    completeAssignment();
  } else {
    renderStoryPicker();
  }
};

/* ═══════════════════════════════════════════════
   SHARED ANSWER HANDLING (with autosave + live sync)
═══════════════════════════════════════════════ */
window.handleSubmit = async (mode, roundId) => {
  const inputBox = mode === "first" ? $("student-answer") : $(`followup-answer-${roundId}`);
  const answer   = inputBox.value.trim();
  if (!answer) { toast("Please write an answer first.", true); return; }

  if (mode === "first") {
    $("submit-btn").disabled = true;
    inputBox.disabled = true;
  } else {
    inputBox.disabled = true;
    const btn = inputBox.parentElement.querySelector("button");
    if (btn) { btn.disabled = true; btn.textContent = "Submitting…"; }
  }

  const fbArea = $("ai-feedback-area");
  const thinkingId = `thinking-${Date.now()}`;
  fbArea.insertAdjacentHTML("beforeend",
    `<div class="ai-response" id="${thinkingId}"><div class="ai-label">Tutor</div>
     <div class="typing-dots"><span></span><span></span><span></span></div></div>`);

  const rawFeedback = await getAIFeedback(answer);

  let signal = "CONTINUE";
  let cleanFeedback = rawFeedback;
  if (rawFeedback.includes("[ADVANCE]")) {
    signal = "ADVANCE";
    cleanFeedback = rawFeedback.replace(/\[ADVANCE\]/g, "").trim();
  } else if (rawFeedback.includes("[CONTINUE]")) {
    cleanFeedback = rawFeedback.replace(/\[CONTINUE\]/g, "").trim();
  }

  const thinkingEl = $(thinkingId);
  if (thinkingEl) thinkingEl.remove();
  fbArea.insertAdjacentHTML("beforeend",
    `<div class="exchange-block">
       <p class="student-prior-answer"><strong>Your answer:</strong> ${escapeHTML(answer)}</p>
       <div class="ai-response"><div class="ai-label">Tutor</div><p>${escapeHTML(cleanFeedback).replace(/\n/g,"<br/>")}</p></div>
     </div>`);

  const ctx = getCurrentContextLabel();
  const qText = getCurrentQuestionText();
  session.push({ context:ctx, question:qText, answer, feedback:cleanFeedback });

  followUpRound++;
  // ★ AUTOSAVE after every exchange (local progress + live teacher visibility)
  await Promise.all([
    saveProgress(),
    savePartialResponse()
  ]);

  const forceAdvance = followUpRound >= MAX_ROUNDS_FOR_Q;

  if (signal === "ADVANCE" || forceAdvance) {
    const ar = $("action-row");
    ar.innerHTML = `<button class="btn btn-primary" onclick="goNextQuestion()">Next Question →</button>`;
    if (forceAdvance && signal !== "ADVANCE") {
      ar.insertAdjacentHTML("afterbegin",
        `<p style="color:var(--ink3);font-size:.85rem;margin-bottom:8px;width:100%">
          You've explored this question well — let's move on.</p>`);
    }
    ar.scrollIntoView({behavior:"smooth", block:"center"});
  } else {
    if (mode === "first") {
      inputBox.style.display = "none";
      $("submit-btn").style.display = "none";
    }
    const newRoundId = followUpRound;
    fbArea.insertAdjacentHTML("beforeend", `
      <div class="followup-input-block">
        <p class="followup-prompt">Develop your answer further based on the tutor's feedback:</p>
        <textarea id="followup-answer-${newRoundId}" class="answer-area" placeholder="Type your next response here…"></textarea>
        <button class="btn btn-primary mt-sm" onclick="handleSubmit('followup', ${newRoundId})">
          Submit (round ${followUpRound + 1} of ${MAX_ROUNDS_FOR_Q})
        </button>
      </div>`);
    setTimeout(() => {
      const nb = $(`followup-answer-${newRoundId}`);
      if (nb) { nb.focus(); nb.scrollIntoView({behavior:"smooth", block:"center"}); }
    }, 100);
  }
};

window.goNextQuestion = () => {
  if (curAssignment.type !== "branching") return nextLinearQuestion();
  if (journey.phase === "story-questions")  return nextStoryQuestion();
  if (journey.phase === "branch-questions") return nextBranchQuestion();
};

function getCurrentContextLabel() {
  if (curAssignment.type !== "branching") return`Q${qIndex+1}`;
  if (journey.phase === "story-questions") {
    const s = curAssignment.stories.find(x=>x.id===journey.currentStoryId);
    return`Story: ${s?.title||""} — Q${qIndex+1}`;
  }
  if (journey.phase === "branch-questions") {
    const currentStory = curAssignment.stories.find(x => x.id === journey.currentStoryId);
    const b = currentStory?.branches?.find(x => x.id === journey.currentBranchId);
    return`Branch: ${b?.title||""} — Q${qIndex+1}`;
  }
  return`Q${qIndex+1}`;
}

function getCurrentQuestionText() {
  if (curAssignment.type !== "branching") {
    const q = curAssignment.questions[qIndex];
    return typeof q === "string" ? q : q.text;
  }
  if (journey.phase === "story-questions") {
    const s = curAssignment.stories.find(x=>x.id===journey.currentStoryId);
    return s.questions[qIndex].text;
  }
  if (journey.phase === "branch-questions") {
    const currentStory = curAssignment.stories.find(x => x.id === journey.currentStoryId);
    const b = currentStory?.branches?.find(x => x.id === journey.currentBranchId);
    return b.questions[qIndex].text;
  }
  return "";
}

async function getAIFeedback(studentAnswer, attempt = 1) {
    const a = curAssignment;
    let systemPrompt;
    let passage;
    let questionText = getCurrentQuestionText();

    if (a.type !== "branching") {
        systemPrompt = a.instructions || "";
        passage = a.passage;
    } else {
        if (journey.phase === "story-questions") {
            const s = curAssignment.stories.find(x => x.id === journey.currentStoryId);
            systemPrompt = s.instructions || a.instructions || "";
            passage = s.passage;
        } else if (journey.phase === "branch-questions") {
            const currentStory = curAssignment.stories.find(x => x.id === journey.currentStoryId);
            const b = currentStory?.branches?.find(x => x.id === journey.currentBranchId);
            systemPrompt = b.instructions || a.instructions || "";
            passage = b.passage;
        }
    }

    const currentCtx = getCurrentContextLabel();
    const sameQ = session.filter(s => s.context === currentCtx);
    const conversationHistory = sameQ.map(s => [
        { role: "user", content: `Question: ${s.question}\nMy answer: ${s.answer}` },
        { role: "assistant", content: s.feedback }
    ]).flat();

    conversationHistory.push({
        role: "user",
        content: `Passage:\n${passage}\n\nQuestion: ${questionText}\n\nMy answer: ${studentAnswer}`
    });

    try {
        // followUpRound starts at 0 for the FIRST submission and increments after each.
        // currentRound (1-indexed) = followUpRound + 1, since we're calling AI for round followUpRound+1.
        const currentRound = followUpRound + 1;
        const maxRounds = MAX_ROUNDS_FOR_Q || 5;
        const isFinalRound = currentRound >= maxRounds;
 
        const resp = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
                action: "getAIFeedback",
                systemPrompt,
                messages: conversationHistory,
                currentRound,
                maxRounds,
                isFinalRound
            })
        });
        const data = await resp.json();

        if (data.feedback) {
            return data.feedback;
        }

        // feedback field missing or empty — retry once if first attempt
        if (attempt === 1) {
            console.warn("AI feedback empty on attempt 1, retrying...");
            return getAIFeedback(studentAnswer, 2);
        }

        return "Thank you for your response. What else can you tell me about that?";

    } catch (e) {
        // fetch threw — retry once if first attempt
        if (attempt === 1) {
            console.warn("AI fetch failed on attempt 1, retrying...", e);
            return getAIFeedback(studentAnswer, 2);
        }

        return "Great effort! What else can you tell me about that?";
    }
}

window.completeAssignment = async () => {
  mc().innerHTML = `<div class="loading-spinner" style="margin-top:80px"></div>`;

  const responseData = {
    assignmentId:    curAssignment.id,
    assignmentTitle: curAssignment.title,
    studentId:       user.uid,
    studentName:     user.displayName,
    studentEmail:    user.email,
    teacherId:       curAssignment.teacherId,
    session,
    journey: curAssignment.type === "branching" ? journey : null,
    isDraft:         false,
    submittedAt:     serverTimestamp(),
    lastSavedAt:     serverTimestamp()
  };
  await setDoc(doc(db, "responses", responseDocId(curAssignment.id)), responseData);

  // ★ Clean up progress doc now that it's finalised
  await deleteProgress(curAssignment.id);

  if (APPS_SCRIPT_URL && !APPS_SCRIPT_URL.startsWith("REPLACE")) {
    try {
      await fetch(APPS_SCRIPT_URL, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({
          action:"saveResponse",
          assignmentTitle: curAssignment.title,
          studentName:     user.displayName,
          studentEmail:    user.email,
          submittedAt:     new Date().toLocaleString(),
          session
        })
      });
    } catch(e) { console.warn("Sheets sync failed:", e); }
  }

  hideAutosavePill();
  mc().innerHTML = `
    <div class="completion-card">
      <div class="completion-icon">🎉</div>
      <h2>Assignment Complete!</h2>
      <p>Great work on <em>${escapeHTML(curAssignment.title)}</em>. Your responses have been saved and your teacher has been notified.</p>
      <button class="btn btn-primary" onclick="renderStudentHome()">← Back to My Assignments</button>
    </div>`;
};

// Save progress if user closes the tab mid-session
window.addEventListener("beforeunload", () => {
  if (user && curAssignment && session.length > 0) {
    // Best-effort sync save — most browsers allow no async here
    try { saveProgress(); savePartialResponse(); } catch(_) {}
  }
});

/* Expose router functions for inline handlers */
window.renderTeacherHome      = renderTeacherHome;
window.renderCreateAssignment = renderCreateAssignment;
window.renderStudentHome      = renderStudentHome;
window.renderAllResponses     = renderAllResponses;

</script>
