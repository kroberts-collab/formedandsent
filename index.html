<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>formedandsent</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#f7f5f0; --surface:#ffffff; --border:#e8e4dc; --ink:#1a1814;
    --ink2:#6b6560; --ink3:#a09b94; --accent:#2d6a4f; --accent2:#52b788;
    --warn:#c9592a; --radius:12px; --shadow:0 2px 12px rgba(0,0,0,.07);
    --shadow-lg:0 8px 32px rgba(0,0,0,.10);
    font-family:'DM Sans',sans-serif;
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--ink); min-height:100vh; }
  h1,h2,h3 { font-family:'Lora',serif; }
  a { color:var(--accent); }

  .hidden { display:none !important; }
  .mt-sm { margin-top:8px; } .mt-md { margin-top:16px; } .mt-lg { margin-top:24px; }

  .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px;
         border-radius:8px; font-size:.9rem; font-weight:500; cursor:pointer;
         border:none; transition:all .15s; font-family:inherit; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover:not(:disabled) { background:#235c43; }
  .btn-secondary { background:var(--surface); color:var(--ink); border:1.5px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background:var(--bg); }
  .btn-ghost { background:transparent; color:var(--ink2); border:1.5px solid var(--border); padding:7px 14px; font-size:.85rem; }
  .btn-ghost:hover { background:var(--bg); }
  .btn-danger { background:#fdf0ec; color:var(--warn); border:1.5px solid #f5c9bb; }
  .btn-danger:hover { background:#fbe0d6; }
  .btn-google { background:#fff; color:#3c4043; border:1.5px solid #dadce0; font-size:1rem; padding:12px 24px; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.1); }
  .btn-google:hover { background:#f8f9fa; box-shadow:0 2px 8px rgba(0,0,0,.12); }
  .btn-icon { background:transparent; color:var(--ink3); border:none; padding:4px 8px; cursor:pointer; font-size:1rem; border-radius:6px; }
  .btn-icon:hover { background:var(--bg); color:var(--warn); }

  #landing {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(145deg,#e8f4ee 0%,#f7f5f0 50%,#fdf6ee 100%);
  }
  .landing-card {
    background:var(--surface); border-radius:20px; padding:56px 64px;
    box-shadow:var(--shadow-lg); text-align:center; max-width:440px; width:90%;
    border:1px solid var(--border);
  }
  .logo-mark {
    width:56px; height:56px; background:var(--accent); border-radius:14px;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:1.6rem; margin-bottom:20px;
  }
  .landing-card h1 { font-size:2rem; margin-bottom:8px; }
  .landing-tagline { color:var(--ink2); font-size:1rem; margin-bottom:32px; line-height:1.5; }
  .divider { border:none; border-top:1px solid var(--border); margin:24px 0; }
  .signin-hint { font-size:.8rem; color:var(--ink3); margin-top:16px; }

  #app { display:none; flex-direction:column; min-height:100vh; }
  .topbar { height:60px; background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 24px; gap:16px; position:sticky; top:0; z-index:100; }
  .topbar-logo { font-family:'Lora',serif; font-size:1.1rem; font-weight:600; color:var(--accent); }
  .topbar-spacer { flex:1; }
  .topbar-role { font-size:.75rem; background:#e8f4ee; color:var(--accent); padding:3px 10px; border-radius:20px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  .user-pill { display:flex; align-items:center; gap:8px; }
  .user-pill img { width:30px; height:30px; border-radius:50%; object-fit:cover; background:var(--border); }
  .user-pill span { font-size:.9rem; color:var(--ink2); }

  .app-body { display:flex; flex:1; }
  .sidebar {
    width:220px; background:var(--surface); border-right:1px solid var(--border);
    padding:24px 12px; display:flex; flex-direction:column; gap:4px;
    position:sticky; top:60px; height:calc(100vh - 60px); overflow-y:auto;
  }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    border-radius:8px; font-size:.9rem; color:var(--ink2); cursor:pointer;
    transition:all .12s; border:none; background:transparent; font-family:inherit; text-align:left; width:100%;
  }
  .nav-item:hover { background:var(--bg); color:var(--ink); }
  .nav-item.active { background:#e8f4ee; color:var(--accent); font-weight:600; }
  .nav-section { font-size:.72rem; color:var(--ink3); padding:12px 14px 4px; text-transform:uppercase; letter-spacing:.07em; font-weight:600; }
  .main-content { flex:1; padding:32px; max-width:900px; }

  .page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:28px; gap:16px; flex-wrap:wrap; }
  .page-title { font-size:1.8rem; margin-bottom:4px; }
  .page-sub { color:var(--ink2); font-size:.95rem; }
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; transition:box-shadow .15s,transform .15s; }
  .card:hover { box-shadow:var(--shadow); transform:translateY(-2px); }
  .card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .tag { font-size:.75rem; font-weight:600; padding:3px 10px; border-radius:20px; background:#e8f4ee; color:var(--accent); }
  .tag.blue { background:#e8f0fb; color:#2563eb; }
  .tag.amber { background:#fef3e2; color:#d97706; }
  .tag.purple { background:#f3e8fd; color:#7c3aed; }
  .card-title { font-family:'Lora',serif; font-size:1.05rem; margin-bottom:6px; }
  .card-excerpt { font-size:.85rem; color:var(--ink2); line-height:1.5; margin-bottom:14px; }
  .card-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .card-meta { font-size:.8rem; color:var(--ink3); margin-bottom:8px; }

  .form-page { max-width:720px; }
  .back-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:.9rem; margin-bottom:20px; padding:0; font-family:inherit; }
  .back-btn:hover { text-decoration:underline; }
  .field-label { display:block; font-size:.85rem; font-weight:600; color:var(--ink2); margin-bottom:6px; margin-top:20px; }
  .field-label:first-of-type { margin-top:24px; }
  .field-input,.field-textarea,.field-select {
    width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px;
    font-size:.95rem; font-family:inherit; background:var(--surface); color:var(--ink);
    transition:border .15s; outline:none;
  }
  .field-input:focus,.field-textarea:focus,.field-select:focus { border-color:var(--accent); }
  .field-textarea { resize:vertical; line-height:1.6; }
  .field-hint { font-size:.8rem; color:var(--ink3); margin-top:4px; }
  .field-row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
  .field-row > div { flex:1; min-width:140px; }
  .question-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .q-num { font-size:.85rem; color:var(--ink3); min-width:20px; }
  .q-input { flex:1; padding:8px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:.9rem; font-family:inherit; outline:none; }
  .q-input:focus { border-color:var(--accent); }
  .q-rounds { width:auto; padding:8px 8px; border:1.5px solid var(--border); border-radius:8px; font-size:.85rem; font-family:inherit; outline:none; background:var(--surface); }
  .form-actions { display:flex; gap:12px; margin-top:32px; flex-wrap:wrap; }
  .class-checkboxes { display:flex; flex-direction:column; gap:10px; margin-top:6px; }
  .class-checkbox { display:flex; align-items:center; gap:10px; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; transition:border .12s; }
  .class-checkbox:hover { border-color:var(--accent2); }
  .class-checkbox input { accent-color:var(--accent); width:16px; height:16px; }
  .class-checkbox label { cursor:pointer; font-size:.92rem; }

  /* Type picker */
  .type-picker { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .type-card { border:2px solid var(--border); border-radius:var(--radius); padding:18px; cursor:pointer; transition:all .15s; background:var(--surface); }
  .type-card:hover { border-color:var(--accent2); }
  .type-card.selected { border-color:var(--accent); background:#e8f4ee; }
  .type-card h3 { font-size:1rem; margin-bottom:6px; }
  .type-card p { font-size:.83rem; color:var(--ink2); line-height:1.5; }

  /* Branching builder */
  .branch-section {
    background:#fdfcf8; border:1px solid var(--border); border-radius:var(--radius);
    padding:20px 24px; margin-top:16px;
  }
  .branch-section-header {
    display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:12px;
  }
  .branch-section-header h3 { font-size:1.05rem; color:var(--accent); }
  .story-block,.learnmore-block {
    background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius);
    padding:16px 20px; margin-top:12px;
  }
  .story-block summary,.learnmore-block summary {
    cursor:pointer; font-weight:600; font-size:.95rem; padding:4px 0; outline:none;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .story-block summary::-webkit-details-marker,.learnmore-block summary::-webkit-details-marker { display:none; }
  .story-block summary::before,.learnmore-block summary::before {
    content:"▸"; color:var(--ink3); transition:transform .15s; display:inline-block;
  }
  .story-block[open] summary::before,.learnmore-block[open] summary::before { transform:rotate(90deg); }
  .summary-content { flex:1; display:flex; align-items:center; gap:8px; }
  .summary-actions { display:flex; gap:6px; }

  /* Student assignment cards */
  .assignment-view { max-width:720px; }
  .progress-bar-wrap { background:var(--border); border-radius:99px; height:6px; margin-bottom:28px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--accent); border-radius:99px; transition:width .4s ease; }
  .passage-box {
    background:#fdfcf8; border:1px solid var(--border); border-radius:var(--radius);
    padding:28px 32px; margin-bottom:24px; line-height:1.8; font-family:'Lora',serif;
    font-size:1rem; color:var(--ink); max-height:420px; overflow-y:auto;
  }
  .question-box { background:var(--surface); border:1.5px solid var(--accent2); border-radius:var(--radius); padding:20px 24px; margin-bottom:16px; }
  .question-label { font-size:.78rem; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
  .question-text { font-family:'Lora',serif; font-size:1.05rem; line-height:1.6; }
  .answer-area { width:100%; min-height:100px; padding:14px; border:1.5px solid var(--border); border-radius:8px; font-size:.95rem; font-family:inherit; resize:vertical; transition:border .15s; outline:none; }
  .answer-area:focus { border-color:var(--accent); }
  .ai-response {
    background:#f0f7f4; border-left:3px solid var(--accent); border-radius:0 8px 8px 0;
    padding:16px 20px; margin:16px 0; font-size:.95rem; line-height:1.7; color:var(--ink);
    animation:fadeIn .3s ease;
  }
  .ai-label { font-size:.75rem; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
  .typing-dots span {
    display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%;
    margin:0 2px; animation:bounce .9s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay:.15s; }
  .typing-dots span:nth-child(3) { animation-delay:.3s; }
  @keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-6px); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .exchange-block { margin-bottom:16px; }
  .student-prior-answer {
    background:var(--bg); padding:10px 14px; border-radius:8px;
    font-size:.9rem; margin-bottom:8px; color:var(--ink2);
    border-left:3px solid var(--ink3);
  }
  .followup-input-block {
    background:var(--surface); border:1.5px solid var(--accent2); border-radius:var(--radius);
    padding:18px 20px; margin-top:16px; margin-bottom:16px;
    animation:fadeIn .3s ease;
  }
  .followup-prompt {
    font-size:.82rem; font-weight:600; color:var(--accent);
    margin-bottom:8px; text-transform:uppercase; letter-spacing:.04em;
  }

  /* ── PROMPT LAYERS UI ─────────────────────────── */
  .prompt-layer-box {
    border:1.5px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    margin-top:10px; background:var(--surface);
  }
  .prompt-layer-header {
    display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;
  }
  .prompt-layer-label { font-weight:600; font-size:.9rem; color:var(--ink); }
  .prompt-layer-controls { display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
  .prompt-layer-select { padding:7px 10px; border:1.5px solid var(--border); border-radius:6px; font-size:.9rem; background:var(--surface); font-family:inherit; min-width:200px; }
  .prompt-multi-select { border:1.5px solid var(--border); border-radius:6px; padding:8px 10px; background:var(--surface); max-height:180px; overflow-y:auto; }
  .prompt-multi-select label { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:.88rem; cursor:pointer; }
  .prompt-multi-select label input { accent-color:var(--accent); }
  .prompt-preview {
    background:#fdfcf8; border:1px dashed var(--border); border-radius:6px;
    padding:10px 14px; margin-top:8px; font-size:.85rem; color:var(--ink2);
    max-height:200px; overflow-y:auto; line-height:1.5; white-space:pre-wrap;
  }
  .prompt-preview-toggle {
    background:none; border:none; color:var(--accent); cursor:pointer;
    font-size:.82rem; padding:0; font-family:inherit;
  }
  .prompt-preview-toggle:hover { text-decoration:underline; }
  .prompt-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 20px; margin-bottom:12px;
  }
  .prompt-card-top { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
  .prompt-card-title { font-family:'Lora',serif; font-size:1rem; }
  .prompt-card-layer-tag { font-size:.7rem; font-weight:700; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.05em; }
  .prompt-card-layer-tag.layer1 { background:#e8f0fb; color:#2563eb; }
  .prompt-card-layer-tag.layer2 { background:#e8f4ee; color:var(--accent); }
  .prompt-card-layer-tag.layer3 { background:#fef3e2; color:#d97706; }
  .prompt-card-body { font-size:.88rem; color:var(--ink2); line-height:1.6; white-space:pre-wrap; max-height:90px; overflow:hidden; position:relative; }
  .prompt-card-body.expanded { max-height:none; }
  .prompt-card-fade { position:absolute; bottom:0; left:0; right:0; height:30px; background:linear-gradient(transparent, var(--surface)); pointer-events:none; }
  .prompt-card-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .builtin-badge { font-size:.7rem; color:var(--ink3); margin-left:6px; font-style:italic; }

  /* Story chooser */
  .story-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:18px; }
  .story-card {
    background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius);
    overflow:hidden; cursor:pointer; transition:all .15s; display:flex; flex-direction:column;
  }
  .story-card:hover { border-color:var(--accent2); transform:translateY(-3px); box-shadow:var(--shadow); }
  .story-card.completed { opacity:.65; }
  .story-card.completed::after { content:"✓ Done"; position:absolute; }
  .story-img-wrap { width:100%; aspect-ratio:16/10; background:#e8f4ee; overflow:hidden; position:relative; }
  .story-img-wrap img { width:100%; height:100%; object-fit:cover; }
  .story-img-placeholder {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-size:2.5rem; color:var(--accent);
  }
  .story-card-body { padding:16px 18px; flex:1; display:flex; flex-direction:column; }
  .story-card-title { font-family:'Lora',serif; font-size:1.05rem; margin-bottom:6px; }
  .story-card-meta { font-size:.8rem; color:var(--ink3); margin-top:auto; padding-top:8px; }
  .story-status-badge {
    position:absolute; top:10px; right:10px; background:var(--accent); color:#fff;
    font-size:.72rem; font-weight:700; padding:4px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:.04em;
  }

  /* Branch picker (Learn More) */
  .branch-picker-card {
    background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius);
    padding:18px 22px; margin-bottom:12px; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:16px;
  }
  .branch-picker-card:hover { border-color:var(--accent2); transform:translateX(4px); }
  .branch-picker-card.completed { opacity:.6; }
  .branch-icon { width:42px; height:42px; background:#e8f4ee; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; color:var(--accent); }
  .branch-body { flex:1; }
  .branch-title { font-family:'Lora',serif; font-size:1rem; margin-bottom:3px; }
  .branch-desc { font-size:.85rem; color:var(--ink3); }

  .completion-card { text-align:center; max-width:500px; margin:60px auto; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:48px 40px; box-shadow:var(--shadow-lg); }
  .completion-icon { font-size:3rem; margin-bottom:16px; }
  .completion-card h2 { margin-bottom:8px; }
  .completion-card p { color:var(--ink2); line-height:1.6; margin-bottom:24px; }

  .responses-table { width:100%; border-collapse:collapse; font-size:.9rem; }
  .responses-table th { text-align:left; padding:10px 14px; font-size:.78rem; font-weight:700; color:var(--ink2); text-transform:uppercase; letter-spacing:.05em; border-bottom:2px solid var(--border); }
  .responses-table td { padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:top; }
  .responses-table tr:last-child td { border-bottom:none; }
  .responses-table tr:hover td { background:var(--bg); }
  .expand-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:.85rem; font-family:inherit; padding:0; }
  .expand-btn:hover { text-decoration:underline; }

  .empty-state { text-align:center; padding:60px 20px; color:var(--ink3); }
  .empty-state .empty-icon { font-size:2.5rem; margin-bottom:12px; }
  .empty-state p { font-size:.95rem; }
  .loading-spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:40px auto; }
  @keyframes spin { to { transform:rotate(360deg); } }

  #toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:#1a1814; color:#fff; padding:12px 20px; border-radius:8px;
    font-size:.9rem; z-index:9999; transition:transform .25s; max-width:340px; text-align:center;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }
  #toast.error { background:var(--warn); }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal { background:var(--surface); border-radius:16px; padding:32px; max-width:560px; width:100%; box-shadow:var(--shadow-lg); max-height:90vh; overflow-y:auto; }
  .modal h2 { margin-bottom:16px; }
  .modal-actions { display:flex; gap:12px; margin-top:24px; justify-content:flex-end; }

  .student-home { max-width:680px; }
  .student-home h1 { margin-bottom:6px; }
  .welcome-sub { color:var(--ink2); margin-bottom:28px; }
  .assignment-student-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px 24px; margin-bottom:12px; display:flex; align-items:center; gap:16px;
    transition:box-shadow .15s; cursor:pointer;
  }
  .assignment-student-card:hover { box-shadow:var(--shadow); }
  .asc-icon { width:44px; height:44px; background:#e8f4ee; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
  .asc-body { flex:1; }
  .asc-title { font-family:'Lora',serif; font-size:1rem; margin-bottom:3px; }
  .asc-meta { font-size:.82rem; color:var(--ink3); }
  .status-badge { font-size:.75rem; font-weight:600; padding:3px 10px; border-radius:20px; }
  .status-badge.done { background:#e8f4ee; color:var(--accent); }
  .status-badge.todo { background:#fef3e2; color:#d97706; }
  .status-badge.partial { background:#e8f0fb; color:#2563eb; }

  /* Progress chip strip on student journey */
  .journey-progress {
    display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;
    background:var(--surface); padding:12px 16px; border-radius:var(--radius); border:1px solid var(--border);
    font-size:.85rem; align-items:center;
  }
  .journey-progress strong { color:var(--accent); }

let _promptCache = null;

async function loadPromptLibrary() {
  if (_promptCache) return _promptCache;
  const lib = { layer1:[], layer2:[], layer3:[] };
  const hiddenBuiltins = new Set();
  try {
    const snp = await getDocs(query(collection(db,"prompts"), where("teacherId","==",user.uid)));
    snp.forEach(d => {
      const p = { id:d.id, ...d.data() };
      if (p.hiddenBuiltinId) {
        hiddenBuiltins.add(p.hiddenBuiltinId);
      } else if (lib[p.layer]) {
        lib[p.layer].push(p);
      }
    });
  } catch(e) { console.warn("loadPromptLibrary:", e); }
  ["layer1","layer2","layer3"].forEach(layer => {
    BUILTIN_PROMPTS[layer].forEach(bp => {
      if (!hiddenBuiltins.has(bp.id)) lib[layer].unshift(bp);
    });
  });
  _promptCache = lib;
  return lib;
}

function invalidatePromptCache() { _promptCache = null; }

async function savePromptToLibrary(layer, name, text, existingId) {
  const data = { layer, name, text, teacherId:user.uid, updatedAt: serverTimestamp() };
  if (existingId && !existingId.startsWith("builtin-")) {
    await setDoc(doc(db,"prompts",existingId), data, { merge:true });
  } else {
    data.createdAt = serverTimestamp();
    await addDoc(collection(db,"prompts"), data);
  }
  invalidatePromptCache();
}

async function deletePromptFromLibrary(id, isBuiltin, builtinId, layer) {
  if (isBuiltin) {
    await addDoc(collection(db,"prompts"), {
      teacherId:user.uid, layer, hiddenBuiltinId:builtinId, createdAt:serverTimestamp()
    });
  } else {
    await deleteDoc(doc(db,"prompts",id));
  }
  invalidatePromptCache();
}

function escapeAttr(s) { return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function renderPromptLayerSelector(containerId, layer, multiSelect, currentValue) {
  const lib = await loadPromptLibrary();
  const items = lib[layer] || [];
  const container = document.getElementById(containerId);
  if (!container) return;

  const layerNames = {
    layer1: "Layer 1 · Global Baseline",
    layer2: "Layer 2 · Preset Approach",
    layer3: "Layer 3 · Assignment-Specific Notes"
  };
  const layerHints = {
    layer1: "Foundational rules — tone, length, theology. Usually the same across all assignments.",
    layer2: "The pedagogical approach for this assignment. Pick one or combine several.",
    layer3: "Notes specific to THIS assignment (watch-points, what to push on)."
  };

  let html = `<div class="prompt-layer-box" data-layer="${layer}">
    <div class="prompt-layer-header">
      <div>
        <div class="prompt-layer-label">${layerNames[layer]}</div>
        <p class="field-hint" style="margin:2px 0 0">${layerHints[layer]}</p>
      </div>
      <div class="prompt-layer-controls">
        <button type="button" class="btn btn-ghost" onclick="openPromptEditor('${layer}', null, '${containerId}')" style="padding:5px 10px;font-size:.8rem">+ Add new</button>
      </div>
    </div>`;

  if (multiSelect) {
    const selectedIds = Array.isArray(currentValue) ? currentValue : [];
    html += `<div class="prompt-multi-select" id="${containerId}-checks">`;
    if (items.length === 0) {
      html += `<p style="color:var(--ink3);font-size:.85rem">No options yet. Click "Add new" to create one.</p>`;
    } else {
      items.forEach(p => {
        const checked = selectedIds.includes(p.id) ? "checked" : "";
        html += `<label>
          <input type="checkbox" value="${p.id}" ${checked} onchange="updateLayerPreview('${containerId}')"/>
          <span>${escapeHTML(p.name)}${p.builtin?'<span class="builtin-badge">(built-in)</span>':''}</span>
          <button type="button" class="prompt-preview-toggle" style="margin-left:auto" onclick="event.preventDefault();openPromptEditor('${layer}', '${p.id}', '${containerId}', ${p.builtin?'true':'false'})">edit</button>
        </label>`;
      });
    }
    html += `</div>`;
  } else {
    const selectedId = currentValue || (items[0]?.id || "");
    html += `<select class="prompt-layer-select" id="${containerId}-select" onchange="updateLayerPreview('${containerId}')" style="width:100%;max-width:none">`;
    if (layer === "layer3") html += `<option value="">— None —</option>`;
    items.forEach(p => {
      const selected = p.id === selectedId ? "selected" : "";
      html += `<option value="${p.id}" ${selected}>${escapeHTML(p.name)}${p.builtin?' (built-in)':''}</option>`;
    });
    html += `</select>`;
    html += `<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <button type="button" class="btn btn-ghost" style="padding:5px 10px;font-size:.8rem" onclick="editSelectedPrompt('${layer}','${containerId}')">✏️ Edit selected</button>
    </div>`;
  }

  html += `<button type="button" class="prompt-preview-toggle mt-sm" onclick="togglePromptPreview('${containerId}')">▾ Show combined preview</button>
    <div class="prompt-preview hidden" id="${containerId}-preview"></div>
  </div>`;

  container.innerHTML = html;
  updateLayerPreview(containerId);
}

window.togglePromptPreview = (containerId) => {
  const pv = document.getElementById(`${containerId}-preview`);
  if (pv) pv.classList.toggle("hidden");
};

window.updateLayerPreview = async (containerId) => {
  const lib = await loadPromptLibrary();
  const checks = document.getElementById(`${containerId}-checks`);
  const select = document.getElementById(`${containerId}-select`);
  let combined = "";
  if (checks) {
    const ids = Array.from(checks.querySelectorAll("input:checked")).map(c=>c.value);
    const allItems = [...lib.layer1, ...lib.layer2, ...lib.layer3];
    combined = ids.map(id => allItems.find(p=>p.id===id)?.text || "").filter(Boolean).join("\n\n");
  } else if (select) {
    const id = select.value;
    const allItems = [...lib.layer1, ...lib.layer2, ...lib.layer3];
    combined = allItems.find(p=>p.id===id)?.text || "";
  }
  const pv = document.getElementById(`${containerId}-preview`);
  if (pv) pv.textContent = combined || "(nothing selected)";
};

window.editSelectedPrompt = (layer, containerId) => {
  const select = document.getElementById(`${containerId}-select`);
  if (!select || !select.value) { toast("Nothing to edit.", true); return; }
  const isBuiltin = select.value.startsWith("builtin-");
  openPromptEditor(layer, select.value, containerId, isBuiltin);
};

window.openPromptEditor = async (layer, promptId, containerId, isBuiltin) => {
  const lib = await loadPromptLibrary();
  const existing = promptId ? (lib[layer] || []).find(p => p.id === promptId) : null;
  const isB = existing?.builtin || isBuiltin === true || isBuiltin === "true";
  const layerName = { layer1:"Global Baseline", layer2:"Preset Approach", layer3:"Assignment-Specific Notes" }[layer];

  document.body.insertAdjacentHTML("beforeend", `
    <div class="modal-overlay" id="prompt-editor-modal" onclick="if(event.target.id==='prompt-editor-modal')closePromptEditor()">
      <div class="modal">
        <h2>${promptId ? "Edit" : "New"} Prompt</h2>
        <p style="color:var(--ink3);font-size:.85rem;margin-bottom:16px">Layer: ${layerName}</p>
        ${isB ? `<p style="background:#e8f0fb;color:#2563eb;padding:8px 12px;border-radius:6px;font-size:.85rem;margin-bottom:14px">📌 Built-in prompt. Editing creates a new copy — the original stays available.</p>` : ""}
        <label class="field-label" style="margin-top:0">Name</label>
        <input id="pe-name" class="field-input" value="${escapeHTML(existing?.name || "")}" placeholder="e.g. Bible Study Socratic v2"/>
        <label class="field-label">Prompt Text</label>
        <textarea id="pe-text" class="field-textarea" rows="12" placeholder="Type the prompt instructions…">${escapeHTML(existing?.text || "")}</textarea>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closePromptEditor()">Cancel</button>
          ${(existing && !isB) ? `<button class="btn btn-primary" onclick="savePromptEdit('${layer}','${promptId}','${containerId}',false)">Update existing</button>` : ""}
          <button class="btn btn-primary" onclick="savePromptEdit('${layer}','${promptId}','${containerId}',true)">${existing ? "Save as new" : "Save"}</button>
        </div>
      </div>
    </div>`);
};

window.closePromptEditor = () => {
  const m = document.getElementById("prompt-editor-modal");
  if (m) m.remove();
};

window.savePromptEdit = async (layer, promptId, containerId, asNew) => {
  const name = document.getElementById("pe-name").value.trim();
  const text = document.getElementById("pe-text").value.trim();
  if (!name || !text) { toast("Name and text are required.", true); return; }
  if (!asNew && promptId && !promptId.startsWith("builtin-")) {
    await savePromptToLibrary(layer, name, text, promptId);
    toast("Prompt updated ✓");
  } else {
    await savePromptToLibrary(layer, name, text, null);
    toast("Prompt saved ✓");
  }
  closePromptEditor();
  if (containerId === "_library_") {
    renderPromptLibrary();
  } else {
    const checks = document.getElementById(`${containerId}-checks`);
    const multi = !!checks;
    let currentValue = null;
    if (multi) {
      currentValue = Array.from(checks.querySelectorAll("input:checked")).map(c=>c.value);
    } else {
      const sel = document.getElementById(`${containerId}-select`);
      currentValue = sel?.value;
    }
    await renderPromptLayerSelector(containerId, layer, multi, currentValue);
  }
};

  const msg = isB ? "Hide this built-in prompt from your library?" : "Delete this prompt permanently?";
  if (!confirm(msg)) return;
  await deletePromptFromLibrary(id, isB, builtinId, layer);
  renderPromptLibrary();
  toast(isB ? "Hidden." : "Deleted.");
};

async function resolvePromptSelection(layer, value) {
  const lib = await loadPromptLibrary();
  const items = lib[layer] || [];
  if (Array.isArray(value)) {
    return value.map(id => items.find(p=>p.id===id)?.text || "").filter(Boolean).join("\n\n");
  } else {
    const found = items.find(p=>p.id===value);
    return found?.text || "";
  }
}

window.saveLinear = async (existingId) => {
  const title   = $("f-title").value.trim();
  const passage = $("f-passage").value.trim();
  if (!title || !passage) { toast("Title and passage are required.", true); return; }

  const qs = [];
  document.querySelectorAll(".q-input").forEach((inp,idx) => {
    const t = inp.value.trim();
    if (t) {
      const r = parseInt(document.querySelectorAll(".q-rounds")[idx].value, 10) || 5;
      qs.push({ text:t, maxRounds:r });
    }
  });
  if (!qs.length) { toast("Add at least one question.", true); return; }

  // Read prompt-layer selections and resolve to combined instruction text
  const l1sel = document.getElementById("prompt-l1-select");
  const l2checks = document.getElementById("prompt-l2-checks");
  const l3sel = document.getElementById("prompt-l3-select");
  const promptCfg = {
    layer1: l1sel?.value || "",
    layer2: l2checks ? Array.from(l2checks.querySelectorAll("input:checked")).map(c=>c.value) : [],
    layer3: l3sel?.value || ""
  };
  const resolvedInstructions = [
    await resolvePromptSelection("layer1", promptCfg.layer1),
    await resolvePromptSelection("layer2", promptCfg.layer2),
    await resolvePromptSelection("layer3", promptCfg.layer3)
  ].filter(Boolean).join("\n\n");

  const { classIds, classNames } = readClassChecks();
  const payload = {
    type:"linear", title, passage,
    subject:      $("f-subject").value.trim(),
    questions:    qs,
    promptCfg,
    instructions: resolvedInstructions,
    classIds, classNames,
    teacherId:    user.uid,
    teacherName:  user.displayName,
    updatedAt:    serverTimestamp()
  };
  await commonSaveAndPost(existingId, payload);
};

function qRow(prefix, parentIdx, qi, text="", rounds=5) {

  return `<div class="question-row q-row-${prefix}-${parentIdx}-${qi}">
    <span class="q-num">${qi+1}.</span>
    <input class="q-input qx" value="${escapeHTML(text)}" placeholder="Question ${qi+1}…"/>
    <select class="q-rounds qrx">${opts}</select>
    <button class="btn-icon" onclick="removeQ('${prefix}',${parentIdx},${qi},this)" title="Remove">✕</button>
  </div>`;

// Read current branches from DOM for connection updates
function readBranchesFromDOM() {
  const branches = [];
  document.querySelectorAll(".learnmore-block").forEach((blk) => {
    const bTitle = blk.querySelector(".b-title").value.trim();
    const bDesc = blk.querySelector(".b-desc").value.trim();
    const bPass = blk.querySelector(".b-passage").value.trim();
    const bInstr = blk.querySelector(".b-instructions").value.trim();
    if (!bTitle && !bPass) return;
    const qs = [];
    blk.querySelectorAll(".b-questions .question-row").forEach(row => {
      const t = row.querySelector(".qx").value.trim();
      if (t) qs.push({ text: t, maxRounds: parseInt(row.querySelector(".qrx").value, 10) || 5 });
    });
    branches.push({
      id: blk.dataset.id || `b${Date.now()}_${branches.length}`,
      title: bTitle, description: bDesc, passage: bPass, instructions: bInstr, questions: qs
    });
  });
  return branches;
}

// Refresh branch connection checkboxes in all stories when branches change
function refreshStoryBranchConnections() {
  const currentBranches = readBranchesFromDOM();
  document.querySelectorAll(".story-block").forEach((blk, idx) => {
    // Preserve currently selected connections
    const currentConnected = Array.from(blk.querySelectorAll(".s-branch-conn:checked")).map(cb => cb.value);
    const s = {
      id: blk.dataset.id,
      title: blk.querySelector(".s-title").value,
      imageUrl: blk.querySelector(".s-image").value,
      passage: blk.querySelector(".s-passage").value,
      instructions: blk.querySelector(".s-instructions").value,
      connectedBranchIds: currentConnected,
      questions: [] // not needed for refresh
    };
    // Rebuild only the connection section
    const connLabel = blk.querySelector('label:nth-of-type(6)');
    const connHint = blk.querySelector('label:nth-of-type(6) + .field-hint');
    const oldConnDiv = connHint.nextElementSibling;

    const connectedIds = s.connectedBranchIds || [];
    const branchConnectHTML = currentBranches.length === 0
      ? `<p style="color:var(--ink3);font-size:.85rem;font-style:italic">Add branch templates above first, then connect them here.</p>`
      : `<div class="class-checkboxes" style="margin-top:8px">
          ${currentBranches.map(b => {
            const isConnected = connectedIds.includes(b.id);
            return `<label class="class-checkbox" style="padding:8px 12px">
              <input type="checkbox" class="s-branch-conn" value="${b.id}" ${isConnected ? 'checked' : ''} data-story-idx="${idx}"/>
              <label>${escapeHTML(b.title)}${b.description ? ` <span style="color:var(--ink3);font-size:.8rem">— ${escapeHTML(b.description)}</span>` : ''}</label>
            </label>`;
          }).join("")}
         </div>`;

    if (oldConnDiv && oldConnDiv.classList.contains('class-checkboxes')) {
      oldConnDiv.outerHTML = branchConnectHTML;
    }
  });
}

window.saveBranching = async (existingId) => {
  const title = $("f-title").value.trim();
  if (!title) { toast("Title required.", true); return; }

  // Read all branch templates first (these are global)
  const branches = [];
  document.querySelectorAll(".learnmore-block").forEach((blk) => {
    const bTitle = blk.querySelector(".b-title").value.trim();
    const bDesc = blk.querySelector(".b-desc").value.trim();
    const bPass = blk.querySelector(".b-passage").value.trim();
    const bInstr = blk.querySelector(".b-instructions").value.trim();
    if (!bTitle && !bPass) return;
    const qs = [];
    blk.querySelectorAll(".b-questions .question-row").forEach(row => {
      const t = row.querySelector(".qx").value.trim();
      if (t) qs.push({ text: t, maxRounds: parseInt(row.querySelector(".qrx").value, 10) || 5 });
    });
    branches.push({
      id: blk.dataset.id || `b${Date.now()}_${branches.length}`,
      title: bTitle, description: bDesc, passage: bPass, instructions: bInstr, questions: qs
    });
  });

  // Read all stories with their connected branch IDs
  const stories = [];
  document.querySelectorAll(".story-block").forEach((blk) => {
    const sTitle = blk.querySelector(".s-title").value.trim();
    const sImage = blk.querySelector(".s-image").value.trim();
    const sPass = blk.querySelector(".s-passage").value.trim();
    const sInstr = blk.querySelector(".s-instructions").value.trim();
    if (!sTitle && !sPass) return;

    // Read which branches are connected to this story
    const connectedBranchIds = Array.from(
      blk.querySelectorAll(".s-branch-conn:checked")
    ).map(cb => cb.value);

    const qs = [];
    blk.querySelectorAll(".s-questions .question-row").forEach(row => {
      const t = row.querySelector(".qx").value.trim();
      if (t) qs.push({ text: t, maxRounds: parseInt(row.querySelector(".qrx").value, 10) || 5 });
    });

    stories.push({
      id: blk.dataset.id || `s${Date.now()}_${stories.length}`,
      title: sTitle, imageUrl: sImage, passage: sPass, instructions: sInstr,
      connectedBranchIds, // <-- KEY: which branches belong to this story
      questions: qs
    });
  });

  if (!stories.length) { toast("Add at least one story.", true); return; }

  const reqStories = parseInt($("f-required-stories").value, 10) || 1;
  const reqBranches = parseInt($("f-required-branches").value, 10) || 0;

  if (reqStories > stories.length) { toast(`You require ${reqStories} stories but only have ${stories.length}.`, true); return; }

  // Validate: if branches are required, each story must have at least that many connected
  if (reqBranches > 0) {
    for (const s of stories) {
      if ((s.connectedBranchIds || []).length < reqBranches) {
        toast(`"${s.title}" needs at least ${reqBranches} connected branches (has ${(s.connectedBranchIds || []).length}).`, true);
        return;
      }
    }
  }

  // Read prompt-layer selections and resolve to combined instruction text
  const l1sel = document.getElementById("prompt-l1-select");
  const l2checks = document.getElementById("prompt-l2-checks");
  const l3sel = document.getElementById("prompt-l3-select");
  const promptCfg = {
    layer1: l1sel?.value || "",
    layer2: l2checks ? Array.from(l2checks.querySelectorAll("input:checked")).map(c => c.value) : [],
    layer3: l3sel?.value || ""
  };
  const resolvedInstructions = [
    await resolvePromptSelection("layer1", promptCfg.layer1),
    await resolvePromptSelection("layer2", promptCfg.layer2),
    await resolvePromptSelection("layer3", promptCfg.layer3)
  ].filter(Boolean).join("\n\n");

  const { classIds, classNames } = readClassChecks();
  const payload = {
    type: "branching", title,
    subject: $("f-subject").value.trim(),
    intro: $("f-intro").value.trim(),
    promptCfg,
    instructions: resolvedInstructions,
    stories, branches, // branches still saved as templates for reference
    requiredStories: reqStories,
    requiredBranches: reqBranches,
    classIds, classNames,
    teacherId: user.uid,
    teacherName: user.displayName,
    updatedAt: serverTimestamp()
  };
  await commonSaveAndPost(existingId, payload);
};

function renderClassCheckboxes(classes, selected) {
  return `<div class="class-checkboxes" id="class-checks">
    ${classes.length === 0
      ? `<p style="color:var(--ink3);font-size:.85rem">⚠️ No classes found — make sure your Apps Script URL is set and you've granted access.</p>`
      : classes.map(c => `

          <label>${escapeHTML(c.name)} <span style="color:var(--ink3);font-size:.8rem">(${escapeHTML(c.section||"")})</span></label>
        </label>`).join("")}
  </div>`;
}
function readClassChecks() {
  const checks = document.querySelectorAll('#class-checks input[type=checkbox]:checked');
  return {
    classIds:   Array.from(checks).map(c=>c.value),
    classNames: Array.from(checks).map(c=>c.dataset.name)
  };
}

async function commonSaveAndPost(existingId, payload) {
  let docId = existingId;
  if (existingId) {
    await setDoc(doc(db,"assignments",existingId), payload, {merge:true});
  } else {
    payload.createdAt = serverTimestamp();
    const ref = await addDoc(collection(db,"assignments"), payload);
    docId = ref.id;
  }

  // Post to Google Classroom
  if (payload.classIds.length && APPS_SCRIPT_URL && !APPS_SCRIPT_URL.startsWith("REPLACE")) {
    const assignmentUrl = window.location.href.split("?")[0] + `?a=${docId}`;
    try {
      await fetch(APPS_SCRIPT_URL, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({
          action:"postAssignment",
          token:gToken,
          title: payload.title,
          description:`Complete this AI-powered reading assignment: ${assignmentUrl}`,
          url: assignmentUrl,
          classIds: payload.classIds
        })
      });
      toast("Published to Google Classroom ✓");
    } catch(e) { toast("Saved, but Classroom post failed.", true); }
  } else {
    toast("Assignment saved ✓");
  }
  renderTeacherHome();
}

async function fetchTeacherClasses() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.startsWith("REPLACE")) return [];

  // Lazily request Classroom scope the first time a teacher needs it
  if (!gToken && role === "teacher") {
    try {
      const { reauthenticateWithPopup } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      const result = await reauthenticateWithPopup(auth.currentUser, gpTeacher);
      gToken = result._tokenResponse?.oauthAccessToken || null;
    } catch(e) {
      toast("Couldn't get Classroom access. " + e.message, true);
      return [];
    }
  }

  try {
    const r = await fetch(`${APPS_SCRIPT_URL}?action=getClasses&token=${encodeURIComponent(gToken||"")}`);
    const j = await r.json();
    return j.classes || [];
  } catch(e) { return []; }
}

window.startAssignment = async (assignmentId) => {
  const snap = await getDoc(doc(db,"assignments",assignmentId));
  if (!snap.exists()) { toast("Assignment not found.", true); return; }
  curAssignment = { id: assignmentId, ...snap.data() };
  session = [];
  qIndex = 0;
  followUpRound = 0;

  if (curAssignment.type === "branching") {
    journey = {
      storiesCompleted:  [],
      branchesCompleted: [], // global list (across all stories)
      branchesCompletedThisStory: 0,
      currentStoryId:    null,
      currentBranchId:   null,
      phase:             "story-pick"
    };
    renderStoryPicker();
  } else {
    renderLinearQuestion();
  }
};

/* ═══════════════════════════════════════════════
   STUDENT — LINEAR FLOW
═══════════════════════════════════════════════ */
function renderLinearQuestion() {
  const a = curAssignment;
  const total = a.questions.length;
  const progress = Math.round((qIndex / total) * 100);
  followUpRound = 0;
  const q = typeof a.questions[qIndex] === "string"
    ? { text:a.questions[qIndex], maxRounds:5 }
    : a.questions[qIndex];
  MAX_ROUNDS_FOR_Q = q.maxRounds || 5;

  mc().innerHTML = `
    <div class="assignment-view">
      <button class="back-btn" onclick="renderStudentHome()">← Back</button>
      <h2 style="font-family:'Lora',serif;margin-bottom:4px">${escapeHTML(a.title)}</h2>
      <p style="color:var(--ink3);font-size:.85rem;margin-bottom:16px">Question ${qIndex+1} of ${total}</p>

      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>

      <details ${qIndex===0?"open":""}>
        <summary style="cursor:pointer;font-weight:600;font-size:.9rem;color:var(--ink2);margin-bottom:8px;user-select:none">
          📄 Reading Passage ${qIndex>0?"(click to expand)":""}
        </summary>
        <div class="passage-box">${escapeHTML(a.passage).replace(/\n/g,"<br/>")}</div>
      </details>

      <div class="question-box" style="margin-top:16px">
        <p class="question-label">Question ${qIndex+1}</p>
        <p class="question-text">${escapeHTML(q.text)}</p>
      </div>

      <div id="ai-feedback-area"></div>

      <textarea id="student-answer" class="answer-area" placeholder="Type your answer here…"></textarea>

      <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap" id="action-row">
        <button class="btn btn-primary" id="submit-btn" onclick="handleSubmit('first')">Submit Answer</button>
      </div>
    </div>`;
}

window.nextLinearQuestion = () => {
  qIndex++;
  followUpRound = 0;
  if (qIndex >= curAssignment.questions.length) completeAssignment();
  else renderLinearQuestion();
};

/* ═══════════════════════════════════════════════
   STUDENT — BRANCHING FLOW
═══════════════════════════════════════════════ */
function renderStoryPicker() {
  journey.phase = "story-pick";
  const a = curAssignment;
  const completed = journey.storiesCompleted.length;
  const required = a.requiredStories || 1;
  const remaining = required - completed;

  let progressMsg = "";
  if (completed === 0) {
    progressMsg = `Choose one of ${a.stories.length} stories to begin. <strong>Complete ${required} story${required>1?'ies':''}</strong> to finish this assignment.`;
  } else if (remaining > 0) {
    progressMsg = `Great work! <strong>${completed} of ${required}</strong> stories complete. Choose another to continue.`;
  } else {
    progressMsg = `You've completed all required stories! 🎉`;
  }

  const cardsHTML = a.stories.map(s => {
    const done = journey.storiesCompleted.includes(s.id);
    const img  = s.imageUrl ? normaliseImageURL(s.imageUrl) : "";
    return `
      <div class="story-card ${done?'completed':''}" onclick="${done?'':`pickStory('${s.id}')`}">
        <div class="story-img-wrap" style="position:relative">
          ${img
            ? `<img src="${img}" alt="${escapeHTML(s.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="story-img-placeholder" style="display:none">📖</div>`
            : `<div class="story-img-placeholder">📖</div>`}
          ${done ? `<span class="story-status-badge">✓ Done</span>` : ""}
        </div>
        <div class="story-card-body">
          <p class="story-card-title">${escapeHTML(s.title)}</p>
          <p class="story-card-meta">${(s.questions||[]).length} question${(s.questions||[]).length===1?'':'s'}</p>
        </div>
      </div>`;
  }).join("");

  mc().innerHTML = `
    <div class="assignment-view">
      <button class="back-btn" onclick="renderStudentHome()">← Back</button>
      <h2 style="font-family:'Lora',serif;margin-bottom:4px">${escapeHTML(a.title)}</h2>
      ${a.intro ? `<p style="color:var(--ink2);margin-bottom:20px;line-height:1.6">${escapeHTML(a.intro)}</p>` : ""}
      <div class="journey-progress">${progressMsg}</div>

      ${remaining <= 0
        ? `<div style="text-align:center;margin:40px 0">
             <button class="btn btn-primary" onclick="completeAssignment()">Finish Assignment ✓</button>
           </div>`
        : ""}

      <h3 style="margin-bottom:14px;font-family:'Lora',serif;font-size:1.15rem">${remaining<=0?"Stories":"Choose Your Story"}</h3>
      <div class="story-grid">${cardsHTML}</div>
    </div>`;
}

window.pickStory = (storyId) => {
  const story = curAssignment.stories.find(s => s.id === storyId);
  if (!story) return;
  journey.currentStoryId = storyId;
  journey.phase = "story-questions";
  journey.branchesCompletedThisStory = 0;
  qIndex = 0;
  followUpRound = 0;
  renderStoryQuestion();
};

function renderStoryQuestion() {
  const story = curAssignment.stories.find(s => s.id === journey.currentStoryId);
  if (!story) return;
  const total = story.questions.length;

  if (qIndex >= total) {
    // Story finished — check whether branches should follow
    const requiredBr = curAssignment.requiredBranches || 0;
    const availableBr = (story.connectedBranchIds || []).length;
    if (requiredBr > 0 && availableBr > 0) {
      renderBranchPicker();
    } else {
      finishStory();
    }
    return;
  }

  followUpRound = 0;
  const q = story.questions[qIndex];
  MAX_ROUNDS_FOR_Q = q.maxRounds || 5;
  const progress = Math.round((qIndex / total) * 100);
  const img = story.imageUrl ? normaliseImageURL(story.imageUrl) : "";

  mc().innerHTML = `
    <div class="assignment-view">
      <button class="back-btn" onclick="renderStoryPicker()">← Back to Stories</button>
      <h2 style="font-family:'Lora',serif;margin-bottom:4px">${escapeHTML(story.title)}</h2>
      <p style="color:var(--ink3);font-size:.85rem;margin-bottom:16px">Question ${qIndex+1} of ${total}</p>

      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>

      ${img && qIndex===0 ? `<img src="${img}" alt="" style="width:100%;max-height:280px;object-fit:cover;border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--border)"/>` : ""}

      <details ${qIndex===0?"open":""}>
        <summary style="cursor:pointer;font-weight:600;font-size:.9rem;color:var(--ink2);margin-bottom:8px;user-select:none">
          📄 Story Passage ${qIndex>0?"(click to expand)":""}
        </summary>
        <div class="passage-box">${escapeHTML(story.passage).replace(/\n/g,"<br/>")}</div>
      </details>

      <div class="question-box" style="margin-top:16px">
        <p class="question-label">Question ${qIndex+1}</p>
        <p class="question-text">${escapeHTML(q.text)}</p>
      </div>

      <div id="ai-feedback-area"></div>

      <textarea id="student-answer" class="answer-area" placeholder="Type your answer here…"></textarea>

      <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap" id="action-row">
        <button class="btn btn-primary" id="submit-btn" onclick="handleSubmit('first')">Submit Answer</button>
      </div>
    </div>`;
}

window.nextStoryQuestion = () => {
  qIndex++;
  followUpRound = 0;
  renderStoryQuestion();
};

function renderBranchPicker() {
  journey.phase = "branch-pick";
  const a = curAssignment;
  const currentStory = a.stories.find(s => s.id === journey.currentStoryId);

  // ONLY show branches connected to this story
  const availableBranches = (a.branches || []).filter(b =>
    (currentStory?.connectedBranchIds || []).includes(b.id)
  );

  const requiredBr = a.requiredBranches || 0;
  const doneCount = journey.branchesCompletedThisStory;
  const remaining = requiredBr - doneCount;

  let msg = "";
  if (availableBranches.length === 0) {
    msg = `No extra learning paths for this story.`;
  } else if (doneCount === 0) {
    msg = `Now choose what you'd like to <strong>learn more about</strong>. Complete <strong>${requiredBr}</strong> to continue.`;
  } else if (remaining > 0) {
    msg = `Nice! <strong>${doneCount} of ${requiredBr}</strong> done. Pick another.`;
  } else {
    msg = `All branches complete for this story! 🎉`;
  }

  // Track which branches the student has done globally so they don't re-do
  const branchesDoneSet = new Set(journey.branchesCompleted);

  const branchHTML = availableBranches.map(b => {
    const done = branchesDoneSet.has(b.id);
    return `
      <div class="branch-picker-card ${done ? 'completed' : ''}" onclick="${done ? '' : `pickBranch('${b.id}')`}">
        <div class="branch-icon">🔍</div>
        <div class="branch-body">
          <p class="branch-title">${escapeHTML(b.title)}${done ? ' ✓' : ''}</p>
          ${b.description ? `<p class="branch-desc">${escapeHTML(b.description)}</p>` : ""}
        </div>
      </div>`;
  }).join("");

  mc().innerHTML = `
    <div class="assignment-view">
      <button class="back-btn" onclick="renderStoryPicker()">← Back to Stories</button>
      <h2 style="font-family:'Lora',serif;margin-bottom:4px">Learn More: ${escapeHTML(currentStory?.title || "")}</h2>
      <div class="journey-progress">${msg}</div>
      ${remaining <= 0 || availableBranches.length === 0
        ? `<div style="text-align:center;margin:24px 0">
             <button class="btn btn-primary" onclick="finishStory()">Finish This Story →</button>
           </div>`
        : ""}
      ${availableBranches.length > 0 ? branchHTML : ""}
    </div>`;
}

window.pickBranch = (branchId) => {
  const branch = curAssignment.branches.find(b => b.id === branchId);
  if (!branch) return;
  journey.currentBranchId = branchId;
  journey.phase = "branch-questions";
  qIndex = 0;
  followUpRound = 0;
  renderBranchQuestion();
};

function renderBranchQuestion() {
  const branch = curAssignment.branches.find(b => b.id === journey.currentBranchId);
  if (!branch) return;
  const total = branch.questions.length;

  if (qIndex >= total) {
    // Branch done
    if (!journey.branchesCompleted.includes(branch.id)) journey.branchesCompleted.push(branch.id);
    journey.branchesCompletedThisStory++;
    renderBranchPicker();
    return;
  }

  followUpRound = 0;
  const q = branch.questions[qIndex];
  MAX_ROUNDS_FOR_Q = q.maxRounds || 5;
  const progress = Math.round((qIndex / total) * 100);

  mc().innerHTML = `
    <div class="assignment-view">
      <button class="back-btn" onclick="renderBranchPicker()">← Back</button>
      <h2 style="font-family:'Lora',serif;margin-bottom:4px">${escapeHTML(branch.title)}</h2>
      <p style="color:var(--ink3);font-size:.85rem;margin-bottom:16px">Question ${qIndex+1} of ${total}</p>

      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>

      <details ${qIndex===0?"open":""}>
        <summary style="cursor:pointer;font-weight:600;font-size:.9rem;color:var(--ink2);margin-bottom:8px;user-select:none">
          📄 Reading ${qIndex>0?"(click to expand)":""}
        </summary>
        <div class="passage-box">${escapeHTML(branch.passage).replace(/\n/g,"<br/>")}</div>
      </details>

      <div class="question-box" style="margin-top:16px">
        <p class="question-label">Question ${qIndex+1}</p>
        <p class="question-text">${escapeHTML(q.text)}</p>
      </div>

      <div id="ai-feedback-area"></div>

      <textarea id="student-answer" class="answer-area" placeholder="Type your answer here…"></textarea>

      <div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap" id="action-row">
        <button class="btn btn-primary" id="submit-btn" onclick="handleSubmit('first')">Submit Answer</button>
      </div>
    </div>`;
}

window.nextBranchQuestion = () => {
  qIndex++;
  followUpRound = 0;
  renderBranchQuestion();
};

window.finishStory = () => {
  if (!journey.storiesCompleted.includes(journey.currentStoryId)) {
    journey.storiesCompleted.push(journey.currentStoryId);
  }
  journey.currentStoryId = null;
  journey.currentBranchId = null;
  journey.branchesCompletedThisStory = 0;

  if (journey.storiesCompleted.length >= (curAssignment.requiredStories || 1)) {
    completeAssignment();
  } else {
    renderStoryPicker();
  }
};

/* ═══════════════════════════════════════════════
   SHARED ANSWER HANDLING (linear + branching)
═══════════════════════════════════════════════ */
window.handleSubmit = async (mode, roundId) => {
  const inputBox = mode === "first" ? $("student-answer") : $(`followup-answer-${roundId}`);
  const answer   = inputBox.value.trim();
  if (!answer) { toast("Please write an answer first.", true); return; }

  if (mode === "first") {
    $("submit-btn").disabled = true;
    inputBox.disabled = true;
  } else {
    inputBox.disabled = true;
    const btn = inputBox.parentElement.querySelector("button");
    if (btn) { btn.disabled = true; btn.textContent = "Submitting…"; }
  }

  const fbArea = $("ai-feedback-area");
  const thinkingId = `thinking-${Date.now()}`;
  fbArea.insertAdjacentHTML("beforeend",
    `<div class="ai-response" id="${thinkingId}"><div class="ai-label">Tutor</div>
     <div class="typing-dots"><span></span><span></span><span></span></div></div>`);

  const rawFeedback = await getAIFeedback(answer);

  // Parse [CONTINUE]/[ADVANCE]
  let signal = "CONTINUE";
  let cleanFeedback = rawFeedback;
  if (rawFeedback.includes("[ADVANCE]")) {
    signal = "ADVANCE";
    cleanFeedback = rawFeedback.replace(/\[ADVANCE\]/g, "").trim();
  } else if (rawFeedback.includes("[CONTINUE]")) {
    cleanFeedback = rawFeedback.replace(/\[CONTINUE\]/g, "").trim();
  }

  const thinkingEl = $(thinkingId);
  if (thinkingEl) thinkingEl.remove();
  fbArea.insertAdjacentHTML("beforeend",
    `<div class="exchange-block">
       <p class="student-prior-answer"><strong>Your answer:</strong> ${escapeHTML(answer)}</p>
       <div class="ai-response"><div class="ai-label">Tutor</div><p>${escapeHTML(cleanFeedback).replace(/\n/g,"<br/>")}</p></div>
     </div>`);

  // Save in session with context label
  const ctx = getCurrentContextLabel();
  const qText = getCurrentQuestionText();
  session.push({ context:ctx, question:qText, answer, feedback:cleanFeedback });

  followUpRound++;
  const forceAdvance = followUpRound >= MAX_ROUNDS_FOR_Q;

  if (signal === "ADVANCE" || forceAdvance) {
    const ar = $("action-row");
    ar.innerHTML = `<button class="btn btn-primary" onclick="goNextQuestion()">Next Question →</button>`;
    if (forceAdvance && signal !== "ADVANCE") {
      ar.insertAdjacentHTML("afterbegin",
        `<p style="color:var(--ink3);font-size:.85rem;margin-bottom:8px;width:100%">
          You've explored this question well — let's move on.</p>`);
    }
    ar.scrollIntoView({behavior:"smooth", block:"center"});
  } else {
    // Hide original input on first round; just add follow-up
    if (mode === "first") {
      inputBox.style.display = "none";
      $("submit-btn").style.display = "none";
    }
    const newRoundId = followUpRound;
    fbArea.insertAdjacentHTML("beforeend", `
      <div class="followup-input-block">
        <p class="followup-prompt">Develop your answer further based on the tutor's feedback:</p>
        <textarea id="followup-answer-${newRoundId}" class="answer-area" placeholder="Type your next response here…"></textarea>
        <button class="btn btn-primary mt-sm" onclick="handleSubmit('followup', ${newRoundId})">
          Submit (round ${followUpRound + 1} of ${MAX_ROUNDS_FOR_Q})
        </button>
      </div>`);
    setTimeout(() => {
      const nb = $(`followup-answer-${newRoundId}`);
      if (nb) { nb.focus(); nb.scrollIntoView({behavior:"smooth", block:"center"}); }
    }, 100);
  }
};

window.goNextQuestion = () => {
  // Decide which next-question handler to call based on phase
  if (curAssignment.type !== "branching") return nextLinearQuestion();
  if (journey.phase === "story-questions")  return nextStoryQuestion();
  if (journey.phase === "branch-questions") return nextBranchQuestion();
};

function getCurrentContextLabel() {
  if (curAssignment.type !== "branching") return `Q${qIndex+1}`;
  if (journey.phase === "story-questions") {
    const s = curAssignment.stories.find(x=>x.id===journey.currentStoryId);
    return `Story: ${s?.title||""} — Q${qIndex+1}`;
  }
  if (journey.phase === "branch-questions") {
    const b = curAssignment.branches.find(x=>x.id===journey.currentBranchId);
    return `Branch: ${b?.title||""} — Q${qIndex+1}`;
  }
  return `Q${qIndex+1}`;
}

function getCurrentQuestionText() {
  if (curAssignment.type !== "branching") {
    const q = curAssignment.questions[qIndex];
    return typeof q === "string" ? q : q.text;
  }
  if (journey.phase === "story-questions") {
    const s = curAssignment.stories.find(x=>x.id===journey.currentStoryId);
    return s.questions[qIndex].text;
  }
  if (journey.phase === "branch-questions") {
    const b = curAssignment.branches.find(x=>x.id===journey.currentBranchId);
    return b.questions[qIndex].text;
  }
  return "";
}

async function getAIFeedback(studentAnswer) {
  const a = curAssignment;
  let systemPrompt;
  let passage;
  let questionText = getCurrentQuestionText();

  if (a.type !== "branching") {
    systemPrompt = a.instructions || "";
    passage = a.passage;
  } else {
    if (journey.phase === "story-questions") {
      const s = curAssignment.stories.find(x=>x.id===journey.currentStoryId);
      systemPrompt = s.instructions || a.instructions || "";
      passage = s.passage;
    } else if (journey.phase === "branch-questions") {
      const b = curAssignment.branches.find(x=>x.id===journey.currentBranchId);
      systemPrompt = b.instructions || a.instructions || "";
      passage = b.passage;
    }
  }

  // Pull only exchanges from CURRENT question into history (not whole journey)
  const currentCtx = getCurrentContextLabel();
  const sameQ = session.filter(s => s.context === currentCtx);
  const conversationHistory = sameQ.map(s => [
    { role:"user", content:`Question: ${s.question}\nMy answer: ${s.answer}` },
    { role:"assistant", content: s.feedback }
  ]).flat();
  conversationHistory.push({
    role:"user",
    content:`Passage:\n${passage}\n\nQuestion: ${questionText}\n\nMy answer: ${studentAnswer}`
  });

  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({
        action:"getAIFeedback",
        systemPrompt,
        messages: conversationHistory
      })
    });
    const data = await resp.json();
    return data.feedback || "Thank you for your response. What evidence from the text supports your thinking?";
  } catch(e) {
    return "Great effort! What specific part of the passage supports your answer?";
  }
}

window.completeAssignment = async () => {
  mc().innerHTML = `<div class="loading-spinner" style="margin-top:80px"></div>`;

  const responseData = {
    assignmentId:    curAssignment.id,
    assignmentTitle: curAssignment.title,
    studentId:       user.uid,
    studentName:     user.displayName,
    studentEmail:    user.email,
    teacherId:       curAssignment.teacherId,
    session,
    journey: curAssignment.type === "branching" ? journey : null,
    submittedAt: serverTimestamp()
  };
  await addDoc(collection(db,"responses"), responseData);

  if (APPS_SCRIPT_URL && !APPS_SCRIPT_URL.startsWith("REPLACE")) {
    try {
      await fetch(APPS_SCRIPT_URL, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({
          action:"saveResponse",
          assignmentTitle: curAssignment.title,
          studentName:     user.displayName,
          studentEmail:    user.email,
          submittedAt:     new Date().toLocaleString(),
          session
        })
      });
    } catch(e) { console.warn("Sheets sync failed:", e); }
  }

  mc().innerHTML = `
    <div class="completion-card">
      <div class="completion-icon">🎉</div>
      <h2>Assignment Complete!</h2>
      <p>Great work on <em>${escapeHTML(curAssignment.title)}</em>. Your responses have been saved and your teacher has been notified.</p>
      <button class="btn btn-primary" onclick="renderStudentHome()">← Back to My Assignments</button>
    </div>`;
};

/* expose for onclick */
window.renderTeacherHome      = renderTeacherHome;
window.renderCreateAssignment = renderCreateAssignment;
window.renderStudentHome      = renderStudentHome;
window.renderAllResponses     = renderAllResponses;
</script>
