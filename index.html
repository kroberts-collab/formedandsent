<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>formedandsent</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#f7f5f0; --surface:#ffffff; --border:#e8e4dc; --ink:#1a1814;
    --ink2:#6b6560; --ink3:#a09b94; --accent:#2d6a4f; --accent2:#52b788;
    --warn:#c9592a; --radius:12px; --shadow:0 2px 12px rgba(0,0,0,.07);
    --shadow-lg:0 8px 32px rgba(0,0,0,.10);
    font-family:'DM Sans',sans-serif;
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--ink); min-height:100vh; }
  h1,h2,h3 { font-family:'Lora',serif; }
  a { color:var(--accent); }

  .hidden { display:none !important; }
  .mt-sm { margin-top:8px; } .mt-md { margin-top:16px; } .mt-lg { margin-top:24px; }

  .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px;
         border-radius:8px; font-size:.9rem; font-weight:500; cursor:pointer;
         border:none; transition:all .15s; font-family:inherit; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover:not(:disabled) { background:#235c43; }
  .btn-secondary { background:var(--surface); color:var(--ink); border:1.5px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background:var(--bg); }
  .btn-ghost { background:transparent; color:var(--ink2); border:1.5px solid var(--border); padding:7px 14px; font-size:.85rem; }
  .btn-ghost:hover { background:var(--bg); }
  .btn-danger { background:#fdf0ec; color:var(--warn); border:1.5px solid #f5c9bb; }
  .btn-danger:hover { background:#fbe0d6; }
  .btn-google { background:#fff; color:#3c4043; border:1.5px solid #dadce0; font-size:1rem; padding:12px 24px; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.1); }
  .btn-google:hover { background:#f8f9fa; box-shadow:0 2px 8px rgba(0,0,0,.12); }
  .btn-icon { background:transparent; color:var(--ink3); border:none; padding:4px 8px; cursor:pointer; font-size:1rem; border-radius:6px; }
  .btn-icon:hover { background:var(--bg); color:var(--warn); }

  #landing {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(145deg,#e8f4ee 0%,#f7f5f0 50%,#fdf6ee 100%);
  }
  .landing-card {
    background:var(--surface); border-radius:20px; padding:56px 64px;
    box-shadow:var(--shadow-lg); text-align:center; max-width:440px; width:90%;
    border:1px solid var(--border);
  }
  .logo-mark {
    width:56px; height:56px; background:var(--accent); border-radius:14px;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:1.6rem; margin-bottom:20px;
  }
  .landing-card h1 { font-size:2rem; margin-bottom:8px; }
  .landing-tagline { color:var(--ink2); font-size:1rem; margin-bottom:32px; line-height:1.5; }
  .divider { border:none; border-top:1px solid var(--border); margin:24px 0; }
  .signin-hint { font-size:.8rem; color:var(--ink3); margin-top:16px; }

  #app { display:none; flex-direction:column; min-height:100vh; }
  .topbar { height:60px; background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 24px; gap:16px; position:sticky; top:0; z-index:100; }
  .topbar-logo { font-family:'Lora',serif; font-size:1.1rem; font-weight:600; color:var(--accent); }
  .topbar-spacer { flex:1; }
  .topbar-role { font-size:.75rem; background:#e8f4ee; color:var(--accent); padding:3px 10px; border-radius:20px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  .user-pill { display:flex; align-items:center; gap:8px; }
  .user-pill img { width:30px; height:30px; border-radius:50%; object-fit:cover; background:var(--border); }
  .user-pill span { font-size:.9rem; color:var(--ink2); }

  .app-body { display:flex; flex:1; }
  .sidebar {
    width:220px; background:var(--surface); border-right:1px solid var(--border);
    padding:24px 12px; display:flex; flex-direction:column; gap:4px;
    position:sticky; top:60px; height:calc(100vh - 60px); overflow-y:auto;
  }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    border-radius:8px; font-size:.9rem; color:var(--ink2); cursor:pointer;
    transition:all .12s; border:none; background:transparent; font-family:inherit; text-align:left; width:100%;
  }
  .nav-item:hover { background:var(--bg); color:var(--ink); }
  .nav-item.active { background:#e8f4ee; color:var(--accent); font-weight:600; }
  .nav-section { font-size:.72rem; color:var(--ink3); padding:12px 14px 4px; text-transform:uppercase; letter-spacing:.07em; font-weight:600; }
  .main-content { flex:1; padding:32px; max-width:900px; }

  .page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:28px; gap:16px; flex-wrap:wrap; }
  .page-title { font-size:1.8rem; margin-bottom:4px; }
  .page-sub { color:var(--ink2); font-size:.95rem; }
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; transition:box-shadow .15s,transform .15s; }
  .card:hover { box-shadow:var(--shadow); transform:translateY(-2px); }
  .card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .tag { font-size:.75rem; font-weight:600; padding:3px 10px; border-radius:20px; background:#e8f4ee; color:var(--accent); }
  .tag.blue { background:#e8f0fb; color:#2563eb; }
  .tag.amber { background:#fef3e2; color:#d97706; }
  .tag.purple { background:#f3e8fd; color:#7c3aed; }
  .tag.draft { background:#fef3e2; color:#d97706; }
  .card-title { font-family:'Lora',serif; font-size:1.05rem; margin-bottom:6px; }
  .card-excerpt { font-size:.85rem; color:var(--ink2); line-height:1.5; margin-bottom:14px; }
  .card-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .card-meta { font-size:.8rem; color:var(--ink3); margin-bottom:8px; }

  .form-page { max-width:720px; }
  .back-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:.9rem; margin-bottom:20px; padding:0; font-family:inherit; }
  .back-btn:hover { text-decoration:underline; }
  .field-label { display:block; font-size:.85rem; font-weight:600; color:var(--ink2); margin-bottom:6px; margin-top:20px; }
  .field-label:first-of-type { margin-top:24px; }
  .field-input,.field-textarea,.field-select {
    width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px;
    font-size:.95rem; font-family:inherit; background:var(--surface); color:var(--ink);
    transition:border .15s; outline:none;
  }
  .field-input:focus,.field-textarea:focus,.field-select:focus { border-color:var(--accent); }
  .field-textarea { resize:vertical; line-height:1.6; }
  .field-hint { font-size:.8rem; color:var(--ink3); margin-top:4px; }
  .field-row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
  .field-row > div { flex:1; min-width:140px; }
  .question-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .q-num { font-size:.85rem; color:var(--ink3); min-width:20px; }
  .q-input { flex:1; padding:8px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:.9rem; font-family:inherit; outline:none; }
  .q-input:focus { border-color:var(--accent); }
  .q-rounds { width:auto; padding:8px 8px; border:1.5px solid var(--border); border-radius:8px; font-size:.85rem; font-family:inherit; outline:none; background:var(--surface); }
  .form-actions { display:flex; gap:12px; margin-top:32px; flex-wrap:wrap; }
  .class-checkboxes { display:flex; flex-direction:column; gap:10px; margin-top:6px; }
  .class-checkbox { display:flex; align-items:center; gap:10px; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; transition:border .12s; }
  .class-checkbox:hover { border-color:var(--accent2); }
  .class-checkbox input { accent-color:var(--accent); width:16px; height:16px; }
  .class-checkbox label { cursor:pointer; font-size:.92rem; }
  /* ── EXPANDABLE CLASS PICKER ──────────────── */
.class-picker-item {
  border:1.5px solid var(--border); border-radius:8px; margin-bottom:8px;
  background:var(--surface); transition:border-color .12s;
}
.class-picker-item:hover { border-color:var(--accent2); }
.class-picker-row {
  display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer;
}
.class-picker-row input[type=checkbox] { accent-color:var(--accent); width:16px; height:16px; }
.class-picker-name { font-size:.92rem; flex:1; }
.class-picker-summary { font-size:.8rem; color:var(--ink3); margin-right:8px; }
.class-picker-toggle {
  background:none; border:none; color:var(--ink3); font-size:1rem; cursor:pointer;
  padding:2px 6px; transition:transform .15s; user-select:none;
}
.class-picker-toggle.open { transform:rotate(90deg); color:var(--accent); }
.class-picker-students {
  border-top:1px solid var(--border); padding:10px 14px 14px 40px;
  background:var(--bg); max-height:280px; overflow-y:auto;
  border-radius:0 0 8px 8px;
}
.class-picker-students .all-toggle {
  font-size:.85rem; font-weight:600; color:var(--accent); padding:4px 0;
  border-bottom:1px solid var(--border); margin-bottom:8px;
}
.class-picker-students label {
  display:flex; align-items:center; gap:8px; padding:4px 0; font-size:.88rem;
  cursor:pointer;
}
.class-picker-students label.inactive { opacity:.5; color:var(--ink3); }
.class-picker-students label.inactive::after {
  content:" (no longer in class)"; font-size:.75rem; font-style:italic;
}
.class-picker-students .loading { color:var(--ink3); font-size:.85rem; font-style:italic; padding:8px 0; }

  .type-picker { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .type-card { border:2px solid var(--border); border-radius:var(--radius); padding:18px; cursor:pointer; transition:all .15s; background:var(--surface); }
  .type-card:hover { border-color:var(--accent2); }
  .type-card.selected { border-color:var(--accent); background:#e8f4ee; }
  .type-card h3 { font-size:1rem; margin-bottom:6px; }
  .type-card p { font-size:.83rem; color:var(--ink2); line-height:1.5; }

  .stories-wrap {
    background:#fdfcf8; border:1px solid var(--border); border-radius:var(--radius);
    padding:20px 24px; margin-top:16px;
  }
  .stories-wrap-header {
    display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:12px;
  }
  .stories-wrap-header h3 { font-size:1.05rem; color:var(--accent); }

  .story-block {
    background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius);
    padding:16px 20px; margin-top:12px;
  }
  .story-block summary {
    cursor:pointer; font-weight:600; font-size:.95rem; padding:4px 0; outline:none;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    list-style:none;
  }
  .story-block summary::-webkit-details-marker { display:none; }
  .story-block summary::before {
    content:"▸"; color:var(--ink3); transition:transform .15s; display:inline-block;
  }
  .story-block[open] summary::before { transform:rotate(90deg); }
  .summary-content { flex:1; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .summary-actions { display:flex; gap:6px; }
  .branch-count-pill {
    font-size:.72rem; font-weight:600; padding:2px 9px; border-radius:20px;
    background:#f3e8fd; color:#7c3aed; margin-left:6px;
  }
  .branch-count-pill.zero { background:var(--bg); color:var(--ink3); }

  .branches-inside {
    background:linear-gradient(180deg, #f5f3ee 0%, #f7f5f0 100%);
    border:1.5px dashed #d4d0c5; border-radius:var(--radius);
    padding:18px 20px; margin-top:20px;
  }
  .branches-inside-header {
    display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;
    gap:12px; flex-wrap:wrap;
  }
  .branches-inside-header h4 {
    font-size:1rem; color:var(--accent); font-family:'Lora',serif;
    display:flex; align-items:center; gap:8px;
  }
  .branches-inside-hint {
    font-size:.82rem; color:var(--ink3); margin-bottom:12px; line-height:1.5;
  }
  .add-branch-btn {
    background:var(--accent); color:#fff; border:none;
    padding:8px 16px; border-radius:8px; font-size:.85rem; font-weight:500;
    cursor:pointer; font-family:inherit; transition:background .15s;
    display:inline-flex; align-items:center; gap:6px;
  }
  .add-branch-btn:hover { background:#235c43; }

  .learnmore-block {
    background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius);
    padding:14px 18px; margin-top:10px;
  }
  .learnmore-block summary {
    cursor:pointer; font-weight:600; font-size:.9rem; padding:2px 0; outline:none;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    list-style:none;
  }
  .learnmore-block summary::-webkit-details-marker { display:none; }
  .learnmore-block summary::before {
    content:"▸"; color:var(--ink3); transition:transform .15s; display:inline-block;
  }
  .learnmore-block[open] summary::before { transform:rotate(90deg); }

  .no-branches-placeholder {
    text-align:center; padding:16px; color:var(--ink3); font-size:.85rem;
    font-style:italic;
  }

  .assignment-view { max-width:720px; }
  .progress-bar-wrap { background:var(--border); border-radius:99px; height:6px; margin-bottom:28px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--accent); border-radius:99px; transition:width .4s ease; }
  .passage-box {
    background:#fdfcf8; border:1px solid var(--border); border-radius:var(--radius);
    padding:28px 32px; margin-bottom:24px; line-height:1.8; font-family:'Lora',serif;
    font-size:1rem; color:var(--ink); max-height:420px; overflow-y:auto;
  }
  .question-box { background:var(--surface); border:1.5px solid var(--accent2); border-radius:var(--radius); padding:20px 24px; margin-bottom:16px; }
  .question-label { font-size:.78rem; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
  .question-text { font-family:'Lora',serif; font-size:1.05rem; line-height:1.6; }
  .answer-area { width:100%; min-height:100px; padding:14px; border:1.5px solid var(--border); border-radius:8px; font-size:.95rem; font-family:inherit; resize:vertical; transition:border .15s; outline:none; }
  .answer-area:focus { border-color:var(--accent); }
  .ai-response {
    background:#f0f7f4; border-left:3px solid var(--accent); border-radius:0 8px 8px 0;
    padding:16px 20px; margin:16px 0; font-size:.95rem; line-height:1.7; color:var(--ink);
    animation:fadeIn .3s ease;
  }
  .ai-label { font-size:.75rem; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
  .typing-dots span {
    display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%;
    margin:0 2px; animation:bounce .9s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay:.15s; }
  .typing-dots span:nth-child(3) { animation-delay:.3s; }
  @keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-6px); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .exchange-block { margin-bottom:16px; }
  .student-prior-answer {
    background:var(--bg); padding:10px 14px; border-radius:8px;
    font-size:.9rem; margin-bottom:8px; color:var(--ink2);
    border-left:3px solid var(--ink3);
  }
  .followup-input-block {
    background:var(--surface); border:1.5px solid var(--accent2); border-radius:var(--radius);
    padding:18px 20px; margin-top:16px; margin-bottom:16px;
    animation:fadeIn .3s ease;
  }
  .followup-prompt {
    font-size:.82rem; font-weight:600; color:var(--accent);
    margin-bottom:8px; text-transform:uppercase; letter-spacing:.04em;
  }

  /* AUTOSAVE indicator */
  .autosave-pill {
    position:fixed; top:72px; right:24px; z-index:200;
    background:var(--surface); border:1px solid var(--border);
    padding:6px 12px; border-radius:20px; font-size:.78rem;
    color:var(--ink2); display:flex; align-items:center; gap:6px;
    box-shadow:var(--shadow); opacity:0; transition:opacity .25s;
    pointer-events:none;
  }
  .autosave-pill.show { opacity:1; }
  .autosave-pill.saving { color:var(--ink3); }
  .autosave-pill.saved { color:var(--accent); }
  .autosave-pill.error { color:var(--warn); border-color:#f5c9bb; }
  .autosave-pill .dot {
    width:6px; height:6px; border-radius:50%; background:currentColor;
  }
  .autosave-pill.saving .dot { animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:.3}50%{opacity:1} }

  /* Resume prompt modal */
  .resume-card {
    text-align:center; max-width:520px; margin:60px auto;
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:40px 36px; box-shadow:var(--shadow-lg);
  }
  .resume-card h2 { margin-bottom:10px; }
  .resume-card .resume-stats {
    background:var(--bg); border-radius:10px; padding:14px 18px; margin:18px 0;
    font-size:.9rem; color:var(--ink2); line-height:1.6;
  }
  .resume-card .resume-stats strong { color:var(--accent); }
  .resume-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:20px; }

  .prompt-layer-box {
    border:1.5px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    margin-top:10px; background:var(--surface);
  }
  .prompt-layer-header {
    display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;
  }
  .prompt-layer-label { font-weight:600; font-size:.9rem; color:var(--ink); }
  .prompt-layer-controls { display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
  .prompt-layer-select { padding:7px 10px; border:1.5px solid var(--border); border-radius:6px; font-size:.9rem; background:var(--surface); font-family:inherit; min-width:200px; }
  .prompt-multi-select { border:1.5px solid var(--border); border-radius:6px; padding:8px 10px; background:var(--surface); max-height:180px; overflow-y:auto; }
  .prompt-multi-select label { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:.88rem; cursor:pointer; }
  .prompt-multi-select label input { accent-color:var(--accent); }
  .prompt-preview {
    background:#fdfcf8; border:1px dashed var(--border); border-radius:6px;
    padding:10px 14px; margin-top:8px; font-size:.85rem; color:var(--ink2);
    max-height:200px; overflow-y:auto; line-height:1.5; white-space:pre-wrap;
  }
  .prompt-preview-toggle {
    background:none; border:none; color:var(--accent); cursor:pointer;
    font-size:.82rem; padding:0; font-family:inherit;
  }
  .prompt-preview-toggle:hover { text-decoration:underline; }
  .prompt-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 20px; margin-bottom:12px;
  }
  .prompt-card-top { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
  .prompt-card-title { font-family:'Lora',serif; font-size:1rem; }
  .prompt-card-layer-tag { font-size:.7rem; font-weight:700; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.05em; }
  .prompt-card-layer-tag.layer1 { background:#e8f0fb; color:#2563eb; }
  .prompt-card-layer-tag.layer2 { background:#e8f4ee; color:var(--accent); }
  .prompt-card-layer-tag.layer3 { background:#fef3e2; color:#d97706; }
  .prompt-card-body { font-size:.88rem; color:var(--ink2); line-height:1.6; white-space:pre-wrap; max-height:90px; overflow:hidden; position:relative; }
  .prompt-card-body.expanded { max-height:none; }
  .prompt-card-fade { position:absolute; bottom:0; left:0; right:0; height:30px; background:linear-gradient(transparent, var(--surface)); pointer-events:none; }
  .prompt-card-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .builtin-badge { font-size:.7rem; color:var(--ink3); margin-left:6px; font-style:italic; }
  /* ── BULK IMPORT ─────────────────────────────── */
  .import-dropzone {
    border:2px dashed var(--border); border-radius:var(--radius);
    padding:32px 24px; text-align:center; background:var(--bg);
    transition:all .15s; cursor:pointer;
  }
  .import-dropzone:hover { border-color:var(--accent); background:#e8f4ee; }

function escapeAttr(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escapeHTML(s) { return (s||"").replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c])); }

function normaliseImageURL(url) {
  if (!url) return "";
  url = url.trim();

  if (m) return`https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;

/* ═══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ */
function progressDocId(assignmentId) { return`${user.uid}_${assignmentId}`; }

function responseDocId(assignmentId) { return`${user.uid}_${assignmentId}`; }

function showAutosavePill(state, text) {
  const pill = $("autosave-pill");
  const txt  = $("autosave-text");
  if (!pill || !txt) return;
  pill.className =`autosave-pill show ${state}`;
  txt.textContent = text;
  if (state === "saved" || state === "error") {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(()=> pill.className = "autosave-pill", 1800);
  }
}
function hideAutosavePill() {
  const pill = $("autosave-pill");
  if (pill) pill.className = "autosave-pill";
}

async function saveProgress() {
  if (!user || !curAssignment) return;
  showAutosavePill("saving", "Saving…");
  try {
    await setDoc(doc(db,"progress", progressDocId(curAssignment.id)), {
      studentId:       user.uid,
      studentName:     user.displayName,
      studentEmail:    user.email,
      assignmentId:    curAssignment.id,
      assignmentTitle: curAssignment.title,
      teacherId:       curAssignment.teacherId,
      session,
      journey: curAssignment.type === "branching" ? journey : null,
      qIndex,
      followUpRound,
      type: curAssignment.type,
      lastUpdated: serverTimestamp()
    }, { merge:true });
    showAutosavePill("saved", "Saved ✓");
  } catch(e) {
    console.warn("autosave failed:", e);
    showAutosavePill("error", "Save failed");
  }
}

/**
 * savePartialResponse — writes/updates the student's current work
 * to the responses collection so teachers can see progress live.
 */
async function savePartialResponse() {
  if (!user || !curAssignment || session.length === 0) return;
  try {
    const payload = {
      assignmentId:    curAssignment.id,
      assignmentTitle: curAssignment.title,
      studentId:       user.uid,
      studentName:     user.displayName,
      studentEmail:    user.email,
      teacherId:       curAssignment.teacherId,
      session: session,
      journey: curAssignment.type === "branching" ? journey : null,
      isDraft: true,
      lastSavedAt:     serverTimestamp()
    };
    await setDoc(doc(db, "responses", responseDocId(curAssignment.id)), payload, { merge: true });
    logDebug("Partial response saved", { assignmentId: curAssignment.id, exchanges: session.length });
  } catch(e) {
    console.warn("partial response save failed:", e);
  }
}

/**
 * cleanUpPartialResponse — removes the draft flag when assignment is fully submitted
 */
async function cleanUpPartialResponse() {
  if (!user || !curAssignment) return;
  try {
    await updateDoc(doc(db, "responses", responseDocId(curAssignment.id)), {
      isDraft: false,
      submittedAt: serverTimestamp(),
      lastSavedAt: serverTimestamp()
    });
  } catch(e) {
    console.warn("cleanup partial response failed:", e);
  }
}

async function loadProgress(assignmentId) {
  try {
    const snap = await getDoc(doc(db,"progress",`${user.uid}_${assignmentId}`));
    return snap.exists() ? snap.data() : null;
  } catch(e) { console.warn("loadProgress:", e); return null; }
}

async function deleteProgress(assignmentId) {
  try {
    await deleteDoc(doc(db,"progress",`${user.uid}_${assignmentId}`));
  } catch(e) { console.warn("deleteProgress:", e); }
}

/* ═══════════════════════════════════════════════════════════

const BUILTIN_PROMPTS = {

let _promptCache = null;

async function loadPromptLibrary() {
  if (_promptCache) return _promptCache;
  const lib = { layer1:[], layer2:[], layer3:[] };
  const hiddenBuiltins = new Set();
  try {
    const snp = await getDocs(query(collection(db,"prompts"), where("teacherId","==",user.uid)));
    snp.forEach(d => {
      const p = { id:d.id, ...d.data() };
      if (p.hiddenBuiltinId) {
        hiddenBuiltins.add(p.hiddenBuiltinId);
      } else if (lib[p.layer]) {
        lib[p.layer].push(p);
      }
    });
  } catch(e) { console.warn("loadPromptLibrary:", e); }
  ["layer1","layer2","layer3"].forEach(layer => {
    BUILTIN_PROMPTS[layer].forEach(bp => {
      if (!hiddenBuiltins.has(bp.id)) lib[layer].unshift(bp);
    });
  });
  _promptCache = lib;
  return lib;
}

function invalidatePromptCache() { _promptCache = null; }

async function savePromptToLibrary(layer, name, text, existingId) {
  const data = { layer, name, text, teacherId:user.uid, updatedAt: serverTimestamp() };
  if (existingId && !existingId.startsWith("builtin-")) {
    await setDoc(doc(db,"prompts",existingId), data, { merge:true });
  } else {
    data.createdAt = serverTimestamp();
    await addDoc(collection(db,"prompts"), data);
  }
  invalidatePromptCache();
}

async function deletePromptFromLibrary(id, isBuiltin, builtinId, layer) {
  if (isBuiltin) {
    await addDoc(collection(db,"prompts"), {
      teacherId:user.uid, layer, hiddenBuiltinId:builtinId, createdAt:serverTimestamp()
    });
  } else {
    await deleteDoc(doc(db,"prompts",id));
  }
  invalidatePromptCache();
}

window.updateLayerPreview = async (containerId) => {
  const lib = await loadPromptLibrary();
  const checks = document.getElementById(`${containerId}-checks`);
  const select = document.getElementById(`${containerId}-select`);
  let combined = "";
  if (checks) {
    const ids = Array.from(checks.querySelectorAll("input:checked")).map(c=>c.value);
    const allItems = [...lib.layer1, ...lib.layer2, ...lib.layer3];
    combined = ids.map(id => allItems.find(p=>p.id===id)?.text || "").filter(Boolean).join("\n\n");
  } else if (select) {
    const id = select.value;
    const allItems = [...lib.layer1, ...lib.layer2, ...lib.layer3];
    combined = allItems.find(p=>p.id===id)?.text || "";
  }
  const pv = document.getElementById(`${containerId}-preview`);
  if (pv) pv.textContent = combined || "(nothing selected)";
};

  const name = document.getElementById("pe-name").value.trim();

  if (!name || !text) { toast("Name and text are required.", true); return; }

  // FIX: treat string "null", empty string, or actual null as no ID (comes from inline handler)
  const actualPromptId = (promptId === "null" || promptId === "" || promptId === null || promptId === undefined) ? null : promptId;

  logDebug("savePromptEdit", { layer, promptId, actualPromptId, asNew, name, textLength: text.length });

  try {
    if (!asNew && actualPromptId && !actualPromptId.startsWith("builtin-")) {
      await savePromptToLibrary(layer, name, text, actualPromptId);
      toast("Prompt updated ✓");
    } else {
      await savePromptToLibrary(layer, name, text, null);
      toast("Prompt saved ✓");
    }
  } catch (err) {
    console.error("savePromptEdit error:", err);
    toast("Failed to save: " + err.message, true);
    return;
  }

  closePromptEditor();
  if (containerId === "_library_") {
    renderPromptLibrary();

    const multi = !!checks;
    let currentValue = null;
    if (multi) {

    } else {
      const sel = document.getElementById(`${containerId}-select`);

  }
};

window.exportAssignmentXLSX = async (assignmentId) => {
  try {
    const snap = await getDoc(doc(db,"assignments",assignmentId));
    if (!snap.exists()) { toast("Assignment not found.", true); return; }
    const a = snap.data();
 
    // Build rows matching the bulk-import template columns
    const headers = [
      "Type","Story ID","Branch ID","Order","Title","Body / Passage",
      "Image URL","Video URL","Transcript","Max Rounds","AI Goal",
      "Layer 2 Preset","Required Stories","Required Branches","Subject Tag"
    ];
    const rows = [headers];
 
    // Helper to lookup preset id (for Layer 2)
    const layer2Default = (a.promptCfg && Array.isArray(a.promptCfg.layer2) && a.promptCfg.layer2.length > 0)
      ? a.promptCfg.layer2[0] : "";
 
    if (a.type === "branching") {
      // Assignment row
      rows.push([
        "assignment", "", "", "",
        a.title || "",
        a.intro || "",
        "", "", "", "", "",
        layer2Default,
        a.requiredStories || 1,
        "",
        a.subject || ""
      ]);
      // Stories
      (a.stories || []).forEach((s, sIdx) => {
        rows.push([
          "story",
          s.id || "",
          "",
          sIdx + 1,
          s.title || "",
          s.passage || "",
          s.imageUrl || "",
          s.videoUrl || "",
          s.transcript || "",
          "",
          "",
          "",  // Layer 2 preset for story (we don't preserve the ID here, only instructions text)
          "",
          s.requiredBranches || 0,
          ""
        ]);
        // Story questions
        (s.questions || []).forEach((q, qIdx) => {
          rows.push([
            "story-q",
            s.id || "",
            "",
            qIdx + 1,
            "",
            q.text || "",
            "", "", "",
            q.maxRounds || 5,
            q.instructions || "",
            "",
            "", "", ""
          ]);
        });
        // Story branches
        (s.branches || []).forEach((b, bIdx) => {
          rows.push([
            "branch",
            s.id || "",
            b.id || "",
            bIdx + 1,
            b.title || "",
            b.passage || "",
            "", "", "",
            "",
            "",
            "",
            "", "", ""
          ]);
          (b.questions || []).forEach((q, qIdx) => {
            rows.push([
              "branch-q",
              s.id || "",
              b.id || "",
              qIdx + 1,
              "",
              q.text || "",
              "", "", "",
              q.maxRounds || 5,
              q.instructions || "",
              "",
              "", "", ""
            ]);
          });
        });
      });
    } else {
      // Linear assignment — just one passage and questions
      rows.push([
        "assignment", "", "", "",
        a.title || "",
        a.passage || "",
        "", "", "", "", "",
        layer2Default,
        1,
        "",
        a.subject || ""
      ]);
      (a.questions || []).forEach((q, qIdx) => {
        const text = typeof q === "string" ? q : q.text;
        const maxR = typeof q === "string" ? 5 : (q.maxRounds || 5);
        rows.push([
          "story-q",
          "main",
          "",
          qIdx + 1,
          "",
          text || "",
          "", "", "",
          maxR,
          "",
          "",
          "", "", ""
        ]);
      });
      // For linear, add a single "story" row to anchor the questions
      rows.splice(2, 0, [
        "story", "main", "", 1, a.title || "", a.passage || "",
        "", "", "", "", "", "", "", 0, ""
      ]);
    }
 
    // Build the workbook with SheetJS (already loaded)
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(rows);
 
    // Set column widths roughly to match the template
    ws['!cols'] = [
      { wch:14 }, { wch:14 }, { wch:14 }, { wch:8 }, { wch:30 }, { wch:50 },
      { wch:24 }, { wch:24 }, { wch:30 }, { wch:11 }, { wch:35 },
      { wch:24 }, { wch:16 }, { wch:18 }, { wch:14 }
    ];
 
    XLSX.utils.book_append_sheet(wb, ws, "Template");
 
    // Filename
    const safeName = (a.title || "assignment").replace(/[^\w\s-]/g, "").replace(/\s+/g, "_").substring(0, 40);
    XLSX.writeFile(wb, `${safeName}_export.xlsx`);
    toast("Exported ✓");
  } catch(e) {
    console.error(e);
    toast("Export failed: " + e.message, true);
  }
};

window.handleBulkFile = async (file) => {
  if (!file) return;
  try {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type: "array" });
    const sheetName = wb.SheetNames.find(n => n.toLowerCase().includes("template")) || wb.SheetNames[0];
    const sheet = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: "", raw: false });
    parseAndPreview(rows);
  } catch(e) {
    document.getElementById("bulk-preview").innerHTML = `<div class="import-error-list"><strong>Failed to read file:</strong> ${escapeHTML(e.message)}</div>`;
  }
};

// Normalize column name lookups (case-insensitive, trim spaces)
function getCol(row, ...names) {
  for (const name of names) {
    const target = name.toLowerCase().replace(/[\s\/]/g, "");
    for (const key of Object.keys(row)) {
      if (key.toLowerCase().replace(/[\s\/]/g, "") === target) {
        const v = row[key];
        if (v == null) return "";
        return String(v).trim();
      }
    }
  }
  return "";
}

function parseAndPreview(rows) {
  const errors = [];
  const warnings = [];
  let assignmentRow = null;
  const storiesById = {};      // storyId -> { story, questions[], branchesById:{} }
  const orphanQs = [];

  rows.forEach((row, idx) => {
    const rowNum = idx + 2; // +2 because row 1 is header, and we want 1-indexed
    const type = getCol(row, "Type").toLowerCase();
    if (!type) return; // blank row, skip silently

    if (type === "assignment") {
      if (assignmentRow) {
        errors.push(`Row ${rowNum}: Multiple 'assignment' rows found. Only one is allowed.`);
        return;
      }
      assignmentRow = {
        title:           getCol(row, "Title"),
        intro:           getCol(row, "Body / Passage", "Body", "Passage"),
        subject:         getCol(row, "Subject Tag", "Subject"),
        defaultLayer2:   getCol(row, "Layer 2 Preset"),
        requiredStories: parseInt(getCol(row, "Required Stories"), 10) || 1
      };
      if (!assignmentRow.title) errors.push(`Row ${rowNum}: Assignment row missing Title.`);
    }
    else if (type === "story") {
      const storyId = getCol(row, "Story ID");
      if (!storyId) { errors.push(`Row ${rowNum}: Story row missing Story ID.`); return; }
      if (storiesById[storyId]) { errors.push(`Row ${rowNum}: Duplicate Story ID '${storyId}'.`); return; }
      const story = {
        id:           storyId,
        order:        parseInt(getCol(row, "Order"), 10) || 99,
        title:        getCol(row, "Title"),
        passage:      getCol(row, "Body / Passage", "Body", "Passage"),
        imageUrl:     getCol(row, "Image URL"),
        videoUrl:     getCol(row, "Video URL"),
        transcript:   getCol(row, "Transcript"),
        instructions: getCol(row, "Layer 2 Preset"),
        requiredBranches: parseInt(getCol(row, "Required Branches"), 10) || 0,
        questions:    [],
        branches:     []
      };
      if (!story.title)   errors.push(`Row ${rowNum}: Story '${storyId}' missing Title.`);
      if (!story.passage) errors.push(`Row ${rowNum}: Story '${storyId}' missing Body/Passage.`);
      storiesById[storyId] = { story, branchesById: {} };
    }
    else if (type === "story-q") {
      const storyId = getCol(row, "Story ID");
      const text = getCol(row, "Body / Passage", "Body");
      if (!storyId) { errors.push(`Row ${rowNum}: story-q row missing Story ID.`); return; }
      if (!text)    { errors.push(`Row ${rowNum}: story-q row missing Body (question text).`); return; }
      const q = {
        text,
        order:     parseInt(getCol(row, "Order"), 10) || 99,
        maxRounds: parseInt(getCol(row, "Max Rounds"), 10) || 5,
        aiGoal:    getCol(row, "AI Goal"),
        layer2:    getCol(row, "Layer 2 Preset")
      };
      if (!storiesById[storyId]) {
        orphanQs.push({ rowNum, storyId, type, q });
      } else {
        storiesById[storyId].story.questions.push(q);
      }
    }
    else if (type === "branch") {
      const storyId  = getCol(row, "Story ID");
      const branchId = getCol(row, "Branch ID");
      if (!storyId)  { errors.push(`Row ${rowNum}: branch row missing Story ID.`); return; }
      if (!branchId) { errors.push(`Row ${rowNum}: branch row missing Branch ID.`); return; }
      const branch = {
        id:           branchId,
        order:        parseInt(getCol(row, "Order"), 10) || 99,
        title:        getCol(row, "Title"),
        description:  "",
        passage:      getCol(row, "Body / Passage", "Body", "Passage"),
        instructions: getCol(row, "Layer 2 Preset"),
        questions:    []
      };
      if (!branch.title)   errors.push(`Row ${rowNum}: Branch '${branchId}' missing Title.`);
      if (!branch.passage) errors.push(`Row ${rowNum}: Branch '${branchId}' missing Body/Passage.`);
      if (!storiesById[storyId]) {
        errors.push(`Row ${rowNum}: Branch '${branchId}' references unknown story '${storyId}'.`);
      } else if (storiesById[storyId].branchesById[branchId]) {
        errors.push(`Row ${rowNum}: Duplicate Branch ID '${branchId}' under story '${storyId}'.`);
      } else {
        storiesById[storyId].branchesById[branchId] = branch;
        storiesById[storyId].story.branches.push(branch);
      }
    }
    else if (type === "branch-q") {
      const storyId  = getCol(row, "Story ID");
      const branchId = getCol(row, "Branch ID");
      const text     = getCol(row, "Body / Passage", "Body");
      if (!storyId || !branchId) { errors.push(`Row ${rowNum}: branch-q missing Story ID or Branch ID.`); return; }
      if (!text) { errors.push(`Row ${rowNum}: branch-q missing question text.`); return; }
      const q = {
        text,
        order:     parseInt(getCol(row, "Order"), 10) || 99,
        maxRounds: parseInt(getCol(row, "Max Rounds"), 10) || 5,
        aiGoal:    getCol(row, "AI Goal"),
        layer2:    getCol(row, "Layer 2 Preset")
      };
      const s = storiesById[storyId];
      if (!s) {
        errors.push(`Row ${rowNum}: branch-q references unknown story '${storyId}'.`);
      } else if (!s.branchesById[branchId]) {
        errors.push(`Row ${rowNum}: branch-q references unknown branch '${branchId}' under story '${storyId}'.`);
      } else {
        s.branchesById[branchId].questions.push(q);
      }
    }
    else {
      warnings.push(`Row ${rowNum}: Unknown Type '${type}' — skipped.`);
    }
  });

  if (!assignmentRow) errors.push("No 'assignment' row found. Add exactly one row with Type=assignment.");

  // Try to attach orphan questions now that all stories are seen
  orphanQs.forEach(o => {
    if (storiesById[o.storyId]) {
      storiesById[o.storyId].story.questions.push(o.q);
    } else {
      errors.push(`Row ${o.rowNum}: ${o.type} references unknown story '${o.storyId}'.`);
    }
  });

  // Sort stories and questions by Order
  const stories = Object.values(storiesById).map(s => s.story);
  stories.sort((a,b) => a.order - b.order);
  stories.forEach(s => {
    s.questions.sort((a,b) => a.order - b.order);
    s.branches.sort((a,b) => a.order - b.order);
    s.branches.forEach(b => b.questions.sort((a,b) => a.order - b.order));
  });

  renderImportPreview(assignmentRow, stories, errors, warnings);
}

function renderImportPreview(assignmentRow, stories, errors, warnings) {
  const cont = document.getElementById("bulk-preview");
  let html = "";

  const totalQuestions = stories.reduce((sum,s) =>
    sum + (s.questions?.length||0) + (s.branches||[]).reduce((sb,b) => sb + (b.questions?.length||0), 0)
  , 0);
  const totalBranches = stories.reduce((sum,s) => sum + (s.branches?.length||0), 0);

  // Stats
  html += `<div class="import-stats">
    <div class="import-stat">Assignment: <strong>${assignmentRow ? "✓ found" : "✗ missing"}</strong></div>
    <div class="import-stat">Stories: <strong>${stories.length}</strong></div>
    <div class="import-stat">Branches: <strong>${totalBranches}</strong></div>
    <div class="import-stat">Questions: <strong>${totalQuestions}</strong></div>
  </div>`;

  // Errors
  if (errors.length > 0) {
    html += `<div class="import-error-list"><strong>⚠️ Errors (must fix before importing):</strong>
      <ul>${errors.map(e=>`<li>${escapeHTML(e)}</li>`).join("")}</ul></div>`;
  }

  // Warnings
  if (warnings.length > 0) {
    html += `<div class="import-error-list" style="border-left-color:#d97706;background:#fef3e2">
      <strong>Warnings:</strong>
      <ul style="margin:6px 0 0 18px">${warnings.map(w=>`<li style="color:#d97706">${escapeHTML(w)}</li>`).join("")}</ul></div>`;
  }

  // Preview table
  if (assignmentRow && stories.length > 0) {
    html += `<table class="import-preview-table">
      <thead><tr><th>What</th><th>Title</th><th>Detail</th></tr></thead>
      <tbody>`;
    html += `<tr class="row-assignment">
      <td>📋 Assignment</td>
      <td><strong>${escapeHTML(assignmentRow.title)}</strong></td>
      <td>Subject: ${escapeHTML(assignmentRow.subject||'—')} · Requires ${assignmentRow.requiredStories} stor${assignmentRow.requiredStories>1?'ies':'y'}</td>
    </tr>`;
    stories.forEach(s => {
      html += `<tr class="row-story">
        <td>📖 Story</td>
        <td><strong>${escapeHTML(s.title)}</strong></td>
        <td>${s.questions.length} question${s.questions.length===1?'':'s'}${s.imageUrl?' · 🖼':''}${s.videoUrl?' · 🎬':''}${s.transcript?' · 📝':''} · ${s.branches.length} branch${s.branches.length===1?'':'es'}</td>
      </tr>`;
      s.questions.forEach((q,i) => {
        html += `<tr class="row-question">
          <td style="padding-left:30px">└ Q${i+1}</td>
          <td colspan="2" class="truncate-cell">${escapeHTML(q.text)}</td>
        </tr>`;
      });
      s.branches.forEach(b => {
        html += `<tr class="row-branch">
          <td style="padding-left:20px">🔍 Branch</td>
          <td><strong>${escapeHTML(b.title)}</strong></td>
          <td>${b.questions.length} question${b.questions.length===1?'':'s'}</td>
        </tr>`;
        b.questions.forEach((q,i) => {
          html += `<tr class="row-question">
            <td style="padding-left:50px">└ Q${i+1}</td>
            <td colspan="2" class="truncate-cell">${escapeHTML(q.text)}</td>
          </tr>`;
        });
      });
    });
    html += `</tbody></table>`;
  }

  // Actions
  const canSave = errors.length === 0 && assignmentRow && stories.length > 0;
  html += `<div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap">
    ${canSave ? `
      <button class="btn btn-primary" onclick='saveBulkImport(${JSON.stringify(assignmentRow).replace(/'/g,"&#39;")}, ${JSON.stringify(stories).replace(/'/g,"&#39;")}, false)'>
        ✓ Create New Assignment
      </button>
      <button class="btn btn-secondary" onclick='saveBulkImport(${JSON.stringify(assignmentRow).replace(/'/g,"&#39;")}, ${JSON.stringify(stories).replace(/'/g,"&#39;")}, true)'>
        ⊕ Append to existing (same title)
      </button>
    ` : `
      <p style="color:var(--ink3);font-size:.88rem">Fix the errors above to enable import.</p>
    `}
  </div>`;

  cont.innerHTML = html;
}

window.saveBulkImport = async (assignmentRow, stories, appendMode) => {
  try {
    // Convert AI goals + presets per question into resolved instructions strings
    const defaultLayer2Text = await resolvePromptSelection("layer2", assignmentRow.defaultLayer2 ? [assignmentRow.defaultLayer2] : []);

    // Resolve per-question instructions (layer2 + AI goal)
    for (const story of stories) {
      // Story-level instructions: if story has Layer 2 Preset, resolve it
      if (story.instructions) {
        const txt = await resolvePromptSelection("layer2", [story.instructions]);
        story.instructions = txt;
      }
      for (const q of story.questions) {
        const parts = [];
        if (q.layer2) parts.push(await resolvePromptSelection("layer2", [q.layer2]));
        if (q.aiGoal) parts.push(q.aiGoal);
        if (parts.length > 0) q.instructions = parts.join("\n\n");
        delete q.aiGoal; delete q.layer2; delete q.order;
      }
      for (const b of story.branches) {
        if (b.instructions) {
          const txt = await resolvePromptSelection("layer2", [b.instructions]);
          b.instructions = txt;
        }
        for (const q of b.questions) {
          const parts = [];
          if (q.layer2) parts.push(await resolvePromptSelection("layer2", [q.layer2]));
          if (q.aiGoal) parts.push(q.aiGoal);
          if (parts.length > 0) q.instructions = parts.join("\n\n");
          delete q.aiGoal; delete q.layer2; delete q.order;
        }
        delete b.order;
      }
      delete story.order;
    }

    // Build resolved assignment-level instructions
    const l1 = await resolvePromptSelection("layer1", "builtin-l1-standard");
    const resolvedInstructions = [l1, defaultLayer2Text].filter(Boolean).join("\n\n");

    // Check for existing assignment with same title (if append mode)
    let existingId = null;
    if (appendMode) {
      const snp = await getDocs(query(collection(db,"assignments"),
        where("teacherId","==",user.uid),
        where("title","==",assignmentRow.title)));
      if (!snp.empty) {
        existingId = snp.docs[0].id;
      } else {
        toast("No existing assignment with that title — creating new instead.");
      }
    }

    if (existingId) {
      // APPEND mode — merge stories, skipping IDs that already exist
      const existing = (await getDoc(doc(db,"assignments",existingId))).data();
      const existingStoryIds = new Set((existing.stories||[]).map(s=>s.id));
      const newStories = stories.filter(s => !existingStoryIds.has(s.id));
      const mergedStories = [...(existing.stories||[])];

      // For each NEW story, add it
      newStories.forEach(s => mergedStories.push(s));

      // For each existing story, see if any new branches/questions need adding
      stories.forEach(newS => {
        if (existingStoryIds.has(newS.id)) {
          const exS = mergedStories.find(s => s.id === newS.id);
          const exBranchIds = new Set((exS.branches||[]).map(b=>b.id));
          newS.branches.forEach(b => {
            if (!exBranchIds.has(b.id)) {
              exS.branches = exS.branches || [];
              exS.branches.push(b);
            }
          });
        }
      });

      await setDoc(doc(db,"assignments",existingId), {
        stories: mergedStories,
        updatedAt: serverTimestamp()
      }, { merge: true });

      toast(`Appended ${newStories.length} new stor${newStories.length===1?'y':'ies'} ✓`);
    } else {
      // CREATE NEW
      const payload = {
        type: "branching",
        title: assignmentRow.title,
        subject: assignmentRow.subject,
        intro: assignmentRow.intro,
        promptCfg: {
          layer1: "builtin-l1-standard",
          layer2: assignmentRow.defaultLayer2 ? [assignmentRow.defaultLayer2] : [],
          layer3: ""
        },
        instructions: resolvedInstructions,
        stories,
        branches: [], // legacy field, not used in per-story branching
        requiredStories: assignmentRow.requiredStories,
        requiredBranches: 0,
        classIds: [],
        classNames: [],
        teacherId: user.uid,
        teacherName: user.displayName,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      };
      await addDoc(collection(db,"assignments"), payload);
      toast("Assignment created ✓");
    }

    closeBulkModal();
    renderTeacherHome();
  } catch(e) {
    toast("Save failed: " + e.message, true);
    console.error(e);
  }
};

async function resolvePromptSelection(layer, value) {
  const lib = await loadPromptLibrary();
  const items = lib[layer] || [];
  if (Array.isArray(value)) {
    return value.map(id => items.find(p=>p.id===id)?.text || "").filter(Boolean).join("\n\n");
  } else {
    const found = items.find(p=>p.id===value);
    return found?.text || "";
  }
}

    layer3: l3sel?.value || ""
  };
  const resolvedInstructions = [

  ].filter(Boolean).join("\n\n");

  const { classIds, classNames, studentTargets, studentTargetsHistorical } = readClassChecks();
  const payload = {
    type:"linear", title, passage,
    subject:      $("f-subject").value.trim(),
    questions:    qs,
    promptCfg,
    instructions: resolvedInstructions,
    classIds, classNames,
    studentTargets,
    studentTargetsHistorical,
    teacherId:    user.uid,
    teacherName:  user.displayName,
    updatedAt:    serverTimestamp()
  };
  await commonSaveAndPost(existingId, payload);
};

   BRANCHING FORM — branches live inside their story

        </div>
        <p class="field-hint" style="margin-bottom:4px">Each story has its own questions. You can optionally add "Learn More" branches inside each story — students who finish that story's questions will see only that story's branches.</p>
        <div id="stories-container">
          ${stories.map((s, i) => storyBlock(i, s)).join("")}

              ${[1, 2, 3, 4, 5, 6, 7, 8].map(n =>`<option value="${n}" ${n == reqStories ? 'selected' : ''}>${n} stor${n === 1 ? 'y' : 'ies'}</option>`).join("")}

      ${renderClassCheckboxes(classes, d.classIds||[], d.studentTargetsHistorical ? Object.fromEntries(Object.entries(d.studentTargetsHistorical).map(([cid, hist]) => [cid, { historical: hist, selected: (d.studentTargets && d.studentTargets[cid]) || [] }])) : null)}

      <div class="form-actions">

  renderPromptLayerSelector("prompt-l1", "layer1", false, promptCfg.layer1);

function emptyStory(i) {
  return {
    id:`s${Date.now()}_${i}`,
    title: "",
    imageUrl: "",
    passage: "",
    instructions: "",
    branches: [],
    requiredBranches: 0,
    questions: [{ text: "", maxRounds: 5 }]
  };
}

function emptyBranch(i) {
  return {
    id:`b${Date.now()}_${i}`,
    title: "",
    description: "",
    passage: "",
    instructions: "",
    questions: [{ text: "", maxRounds: 5 }]
  };
}

function storyBlock(idx, s) {
  const branches = s.branches || [];
  const branchPill = branches.length === 0
    ?`<span class="branch-count-pill zero">No branches</span>`
    :`<span class="branch-count-pill">${branches.length} branch${branches.length>1?'es':''}</span>`;
  const reqBr = s.requiredBranches ?? 0;
  const branchReqOptions = [];
  for (let n = 0; n <= Math.max(branches.length, 5); n++) {
    const label = n === 0 ? "0 — branches are optional (student can skip)" :`${n} branch${n>1?'es':''} required`;
    branchReqOptions.push(`<option value="${n}" ${n == reqBr ? 'selected' : ''}>${label}</option>`);
  }

  return`<details class="story-block" id="story-${idx}" data-id="${s.id || `s${Date.now()}_${idx}`}" open>
    <summary>
      <span class="summary-content">📖 <span class="story-title-preview">Story ${idx + 1}${s.title ? ": " + escapeHTML(s.title) : ""}</span>${branchPill}</span>
      <span class="summary-actions"><button class="btn-icon" onclick="event.stopPropagation();removeStory(${idx})" title="Remove">✕</button></span>
    </summary>
    <div style="margin-top:12px">
      <label class="field-label" style="margin-top:8px">Story Title *</label>
      <input class="field-input s-title" value="${escapeHTML(s.title || '')}" placeholder="e.g. The Prodigal Son" oninput="updateStoryTitle(${idx}, this.value)"/>

      <label class="field-label">Image URL (Google Drive share link, Wikipedia, etc.)</label>
      <input class="field-input s-image" value="${escapeHTML(s.imageUrl || '')}" placeholder="https://drive.google.com/file/d/.../view"/>
      <p class="field-hint">Paste any public image URL. For Google Drive: right-click image in Drive → Share → Anyone with link → copy URL.</p>

      <label class="field-label">Passage *</label>
      <textarea class="field-textarea s-passage" rows="6" placeholder="Paste the story or passage…">${escapeHTML(s.passage || '')}</textarea>

      <label class="field-label">Questions</label>
      <div class="s-questions">
        ${(s.questions || [{ text: "", maxRounds: 5 }]).map((q, qi) => qRow("s", idx, qi, q.text, q.maxRounds)).join("")}
      </div>
      <button class="btn btn-ghost mt-sm" onclick="addQ('s', ${idx})">+ Add Question</button>

      <label class="field-label">AI Override (optional)</label>
      <textarea class="field-textarea s-instructions" rows="3" placeholder="Leave blank to use default AI instructions">${escapeHTML(s.instructions || '')}</textarea>

      <!-- BRANCHES FOR THIS STORY -->
      <div class="branches-inside" id="nested-branches-${idx}">
        <div class="branches-inside-header">
          <h4>🔍 "Learn More" Branches for This Story</h4>
          <button type="button" class="add-branch-btn" onclick="addNestedBranch(${idx})">+ Add Branch to This Story</button>
        </div>
        <p class="branches-inside-hint">Optional. Only students who finish <strong>this story's</strong> base questions will see these branches. Branches from other stories will not show here.</p>

        <div class="nested-branches-list" id="branches-list-${idx}">
          ${branches.length === 0
            ?`<div class="no-branches-placeholder">No branches yet for this story. Click "Add Branch to This Story" above to create one.</div>`
            : branches.map((b, bi) => nestedBranchBlock(idx, bi, b)).join("")}
        </div>

        ${branches.length > 0 ? `
          <label class="field-label" style="margin-top:14px">After finishing this story, branches required</label>
          <select class="field-select s-required-branches">
            ${branchReqOptions.join("")}
          </select>
          <p class="field-hint">Set to 0 if branches are optional. Otherwise, students must complete this many before this story counts as done.</p>
` : `<input type="hidden" class="s-required-branches" value="0"/>`}
      </div>
    </div>
  </details>`;
}

function nestedBranchBlock(storyIdx, branchIdx, b) {
  return`<details class="learnmore-block" id="branch-${storyIdx}-${branchIdx}" data-id="${b.id || `b${Date.now()}_${storyIdx}_${branchIdx}`}" open>
    <summary>
      <span class="summary-content">🔍 <span class="branch-title-preview">Branch ${branchIdx + 1}${b.title ? ": " + escapeHTML(b.title) : ""}</span></span>
      <span class="summary-actions"><button class="btn-icon" onclick="event.stopPropagation();removeNestedBranch(${storyIdx}, ${branchIdx})" title="Remove">✕</button></span>
    </summary>
    <div style="margin-top:12px">
      <label class="field-label" style="margin-top:8px">Title *</label>
      <input class="field-input nb-title" value="${escapeHTML(b.title || '')}" placeholder="e.g. Cultural Context: Honor and Shame" oninput="updateNestedBranchTitle(${storyIdx}, ${branchIdx}, this.value)"/>

      <label class="field-label">Short Description</label>
      <input class="field-input nb-desc" value="${escapeHTML(b.description || '')}" placeholder="One line shown to students on the branch picker"/>

      <label class="field-label">Passage / Reading *</label>
      <textarea class="field-textarea nb-passage" rows="5" placeholder="The text they'll read for this branch…">${escapeHTML(b.passage || '')}</textarea>

      <label class="field-label">Questions</label>
      <div class="nb-questions">
        ${(b.questions || [{ text: "", maxRounds: 5 }]).map((q, qi) => qRow("nb",`${storyIdx}-${branchIdx}`, qi, q.text, q.maxRounds)).join("")}
      </div>
      <button class="btn btn-ghost mt-sm" onclick="addNestedQ(${storyIdx}, ${branchIdx})">+ Add Question</button>

      <label class="field-label">AI Override (optional)</label>
      <textarea class="field-textarea nb-instructions" rows="3" placeholder="Leave blank to use default AI instructions">${escapeHTML(b.instructions || '')}</textarea>
    </div>
  </details>`;
}

function qRow(prefix, parentIdx, qi, text="", rounds=5) {
  const opts = [1,2,3,4,5].map(n=>`<option value="${n}" ${rounds==n?'selected':''}>${n} round${n>1?'s':''}</option>`).join("");
  return `<div class="question-row q-row-${prefix}-${parentIdx}-${qi}">
    <span class="q-num">${qi+1}.</span>
    <input class="q-input qx" value="${escapeHTML(text)}" placeholder="Question ${qi+1}…"/>
    <select class="q-rounds qrx">${opts}</select>
    <button class="btn-icon" onclick="removeQ('${prefix}','${parentIdx}',${qi},this)" title="Remove">✕</button>
  </div>`;
}

window.addStory = () => {
  const c = $("stories-container");
  const i = c.children.length;
  c.insertAdjacentHTML("beforeend", storyBlock(i, emptyStory(i)));
};
window.removeStory = (i) => {
  if (!confirm("Remove this story and all its branches?")) return;
  const el = $(`story-${i}`); if (el) el.remove();
};
window.updateStoryTitle = (i, val) => {
  const block = $(`story-${i}`); if (!block) return;
  const preview = block.querySelector(".story-title-preview");
  if (preview) preview.textContent =`Story ${i+1}${val?": "+val:""}`;
};

window.addNestedBranch = (storyIdx) => {
  const list = $(`branches-list-${storyIdx}`);
  if (!list) return;
  // Remove placeholder if present
  const placeholder = list.querySelector(".no-branches-placeholder");
  if (placeholder) placeholder.remove();
  const branchIdx = list.children.length;
  list.insertAdjacentHTML("beforeend", nestedBranchBlock(storyIdx, branchIdx, emptyBranch(branchIdx)));

  // Make sure the requiredBranches selector exists (regenerate if it doesn't)
  const nestedBox = $(`nested-branches-${storyIdx}`);
  if (nestedBox && !nestedBox.querySelector(".s-required-branches")) {
    // Add a small selector below the list
    const after = list;
    after.insertAdjacentHTML("afterend", `
      <label class="field-label" style="margin-top:14px">After finishing this story, branches required</label>
      <select class="field-select s-required-branches">
        <option value="0">0 — branches are optional (student can skip)</option>
        <option value="1">1 branch required</option>
      </select>
      <p class="field-hint">Set to 0 if branches are optional. Otherwise, students must complete this many before this story counts as done.</p>
    `);
  } else if (nestedBox) {
    // Update existing select to have enough options
    const sel = nestedBox.querySelector(".s-required-branches");
    if (sel && sel.tagName === "SELECT") {
      const current = parseInt(sel.value, 10) || 0;
      const newCount = list.children.length;
      const need = Math.max(newCount, 5);
      let html = "";
      for (let n = 0; n <= need; n++) {
        const label = n === 0 ? "0 — branches are optional (student can skip)" :`${n} branch${n>1?'es':''} required`;
        html +=`<option value="${n}" ${n === current ? 'selected':''}>${label}</option>`;
      }
      sel.innerHTML = html;
    }
  }
};

window.removeNestedBranch = (storyIdx, branchIdx) => {
  if (!confirm("Remove this branch?")) return;
  const el = $(`branch-${storyIdx}-${branchIdx}`);
  if (el) el.remove();
  // If no branches left, restore placeholder
  const list = $(`branches-list-${storyIdx}`);
  if (list && list.children.length === 0) {
    list.innerHTML =`<div class="no-branches-placeholder">No branches yet for this story. Click "Add Branch to This Story" above to create one.</div>`;
  }
};
window.updateNestedBranchTitle = (storyIdx, branchIdx, val) => {
  const block = $(`branch-${storyIdx}-${branchIdx}`);
  if (!block) return;
  const preview = block.querySelector(".branch-title-preview");
  if (preview) preview.textContent =`Branch ${branchIdx+1}${val?": "+val:""}`;
};

window.addQ = (prefix, parentIdx) => {
  const parentSel = prefix === "s" ?`#story-${parentIdx} .s-questions` :`#branch-${parentIdx} .nb-questions`;
  const cont = document.querySelector(parentSel);
  if (!cont) return;
  cont.insertAdjacentHTML("beforeend", qRow(prefix, parentIdx, cont.children.length));
};
window.addNestedQ = (storyIdx, branchIdx) => {
  const parentSel =`#branch-${storyIdx}-${branchIdx} .nb-questions`;
  const cont = document.querySelector(parentSel);
  if (!cont) return;
  cont.insertAdjacentHTML("beforeend", qRow("nb",`${storyIdx}-${branchIdx}`, cont.children.length));
};
window.removeQ = (prefix, parentIdx, qi, btn) => {
  btn.closest(".question-row").remove();
};

window.saveBranching = async (existingId) => {
  const title = $("f-title").value.trim();
  if (!title) { toast("Title required.", true); return; }

  const stories = [];
  document.querySelectorAll(".story-block").forEach((blk) => {
    const sTitle = blk.querySelector(".s-title").value.trim();
    const sImage = blk.querySelector(".s-image").value.trim();
    const sPass = blk.querySelector(".s-passage").value.trim();
    const sInstr = blk.querySelector(".s-instructions").value.trim();
    if (!sTitle && !sPass) return;

    const qs = [];
    blk.querySelectorAll(".s-questions .question-row").forEach(row => {
      const t = row.querySelector(".qx").value.trim();
      if (t) qs.push({ text: t, maxRounds: parseInt(row.querySelector(".qrx").value, 10) || 5 });
    });

    const branches = [];
    blk.querySelectorAll(".branches-inside .learnmore-block").forEach((bblk) => {
      const bTitle = bblk.querySelector(".nb-title").value.trim();
      const bDesc = bblk.querySelector(".nb-desc").value.trim();
      const bPass = bblk.querySelector(".nb-passage").value.trim();
      const bInstr = bblk.querySelector(".nb-instructions").value.trim();
      if (!bTitle && !bPass) return;

      const bqs = [];
      bblk.querySelectorAll(".nb-questions .question-row").forEach(row => {
        const t = row.querySelector(".qx").value.trim();
        if (t) bqs.push({ text: t, maxRounds: parseInt(row.querySelector(".qrx").value, 10) || 5 });
      });

      branches.push({
        id: bblk.dataset.id ||`b${Date.now()}_${branches.length}`,
        title: bTitle, description: bDesc, passage: bPass, instructions: bInstr, questions: bqs
      });
    });

    // Read per-story requiredBranches
    const reqSel = blk.querySelector(".s-required-branches");
    let storyReqBranches = 0;
    if (reqSel) storyReqBranches = parseInt(reqSel.value, 10) || 0;
    if (storyReqBranches > branches.length) storyReqBranches = branches.length;

    stories.push({
      id: blk.dataset.id ||`s${Date.now()}_${stories.length}`,
      title: sTitle, imageUrl: sImage, passage: sPass, instructions: sInstr,
      branches,
      requiredBranches: storyReqBranches,
      questions: qs
    });
  });

  if (!stories.length) { toast("Add at least one story.", true); return; }

  const reqStories = parseInt($("f-required-stories").value, 10) || 1;
  if (reqStories > stories.length) { toast(`You require ${reqStories} stories but only have ${stories.length}.`, true); return; }

  const l1sel = document.getElementById("prompt-l1-select");
  const l2checks = document.getElementById("prompt-l2-checks");
  const l3sel = document.getElementById("prompt-l3-select");
  const promptCfg = {
    layer1: l1sel?.value || "",
    layer2: l2checks ? Array.from(l2checks.querySelectorAll("input:checked")).map(c => c.value) : [],
    layer3: l3sel?.value || ""
  };
  const resolvedInstructions = [
    await resolvePromptSelection("layer1", promptCfg.layer1),
    await resolvePromptSelection("layer2", promptCfg.layer2),
    await resolvePromptSelection("layer3", promptCfg.layer3)
  ].filter(Boolean).join("\n\n");

  const { classIds, classNames, studentTargets, studentTargetsHistorical } = readClassChecks();
  const payload = {
    type: "branching", title,
    subject: $("f-subject").value.trim(),
    intro: $("f-intro").value.trim(),
    promptCfg,
    instructions: resolvedInstructions,
    stories,
    requiredStories: reqStories,
    classIds, classNames,
    studentTargets,
    studentTargetsHistorical,
    teacherId: user.uid,
    teacherName: user.displayName,
    updatedAt: serverTimestamp()
  };
  await commonSaveAndPost(existingId, payload);
};

function renderClassCheckboxes(classes, selectedClassIds, savedStudentTargets) {
  // selectedClassIds: array of course IDs that should be pre-checked
  // savedStudentTargets: optional map { courseId: { selected: [uid,...], historical: [{userId, name, email},...] } }
  //   if present for a class, we pre-expand and pre-check those students

  if (!classes || classes.length === 0) {
    return `<div class="class-checkboxes" id="class-checks">
      <p style="color:var(--ink3);font-size:.85rem">⚠️ No classes found — make sure your Apps Script URL is set and you've granted access.</p>
    </div>`;
  }

  const targets = savedStudentTargets || {};

  return `<div class="class-checkboxes" id="class-checks">
    ${classes.map(c => {
      const isChecked = (selectedClassIds||[]).includes(c.id);
      const t = targets[c.id];
      const isExpanded = !!t;
      return `<div class="class-picker-item" data-course-id="${c.id}" data-course-name="${escapeAttr(c.name)}" data-historical='${escapeAttr(JSON.stringify(t?.historical || []))}' data-selected-students='${escapeAttr(JSON.stringify(t?.selected || []))}'>
        <div class="class-picker-row">
          <input type="checkbox" class="class-check" value="${c.id}" data-name="${escapeAttr(c.name)}" ${isChecked?"checked":""} onchange="handleClassCheckChange(this)"/>
          <span class="class-picker-name">${escapeHTML(c.name)} <span style="color:var(--ink3);font-size:.8rem">${c.section?"("+escapeHTML(c.section)+")":""}</span></span>
          <span class="class-picker-summary" data-summary>${t && t.selected && t.selected.length > 0 ? t.selected.length + ' student' + (t.selected.length>1?'s':'') + ' selected' : 'Whole class'}</span>
          <button type="button" class="class-picker-toggle ${isExpanded?'open':''}" onclick="toggleClassExpand(this)">▶</button>
        </div>
        <div class="class-picker-students" style="display:${isExpanded?'block':'none'}"></div>
      </div>`;
    }).join("")}
  </div>`;
}

window.toggleClassExpand = async (btn) => {
  const item = btn.closest(".class-picker-item");
  const studentsDiv = item.querySelector(".class-picker-students");
  const isOpen = btn.classList.contains("open");

  if (isOpen) {
    // Collapse
    btn.classList.remove("open");
    studentsDiv.style.display = "none";
    return;
  }

  // Expand
  btn.classList.add("open");
  studentsDiv.style.display = "block";

  // If already loaded, don't re-fetch
  if (studentsDiv.dataset.loaded === "true") return;

  studentsDiv.innerHTML = `<div class="loading">Loading roster…</div>`;
  const courseId = item.dataset.courseId;
  const historical = JSON.parse(item.dataset.historical || "[]");
  const preselected = new Set(JSON.parse(item.dataset.selectedStudents || "[]"));

  try {
    const url = `${APPS_SCRIPT_URL}?action=getStudents&courseId=${encodeURIComponent(courseId)}&token=${encodeURIComponent(gToken||"")}`;
    const r = await fetch(url);
    const j = await r.json();
    const students = j.students || [];

    // Build a set of current students' userIds
    const currentIds = new Set(students.map(s => s.userId));
    // Identify "removed" historical students who were selected but no longer in roster
    const removedStudents = historical.filter(h => !currentIds.has(h.userId));

    let html = `<label class="all-toggle"><input type="checkbox" class="all-students-toggle" onchange="toggleAllStudents(this)"/> <span>Select all in this class</span></label>`;

    // Current students
    students.forEach(s => {
      const checked = preselected.has(s.userId) ? "checked" : "";
      html += `<label>
        <input type="checkbox" class="student-check" value="${s.userId}" data-name="${escapeAttr(s.name)}" data-email="${escapeAttr(s.email)}" ${checked}/>
        <span>${escapeHTML(s.name)}</span>
      </label>`;
    });

    // Historical students who are no longer in the roster (grayed out)
    removedStudents.forEach(s => {
      html += `<label class="inactive">
        <input type="checkbox" class="student-check" value="${s.userId}" data-name="${escapeAttr(s.name)}" data-email="${escapeAttr(s.email)}" data-historical="true" checked/>
        <span>${escapeHTML(s.name)}</span>
      </label>`;
    });

    if (students.length === 0 && removedStudents.length === 0) {
      html += `<p style="color:var(--ink3);font-size:.85rem">No students in this class yet.</p>`;
    }

    studentsDiv.innerHTML = html;
    studentsDiv.dataset.loaded = "true";

    // Update summary whenever any student checkbox changes
    studentsDiv.querySelectorAll(".student-check").forEach(cb => {
      cb.addEventListener("change", () => updateClassSummary(item));
    });
    updateClassSummary(item);
  } catch(e) {
    studentsDiv.innerHTML = `<p style="color:var(--warn);font-size:.85rem">Couldn't load students: ${escapeHTML(e.message)}</p>`;
  }
};

window.handleClassCheckChange = (cb) => {
  // If the teacher just unchecked the class, clear all student selections within it
  if (!cb.checked) {
    const item = cb.closest(".class-picker-item");
    item.querySelectorAll(".student-check").forEach(s => {
      if (!s.dataset.historical) s.checked = false;
    });
    const allToggle = item.querySelector(".all-students-toggle");
    if (allToggle) allToggle.checked = false;
    updateClassSummary(item);
  }
};
window.toggleAllStudents = (cb) => {
  const studentsDiv = cb.closest(".class-picker-students");
  studentsDiv.querySelectorAll(".student-check").forEach(s => {
    if (!s.dataset.historical) s.checked = cb.checked;
  });
  updateClassSummary(cb.closest(".class-picker-item"));
};

function updateClassSummary(item) {
  const summary = item.querySelector("[data-summary]");
  const classCheck = item.querySelector(".class-check");
  const checked = item.querySelectorAll(".student-check:checked");
  if (!summary) return;

  // If any students are checked, auto-check the class
  if (checked.length > 0 && classCheck && !classCheck.checked) {
    classCheck.checked = true;
  }

  if (checked.length === 0) {
    summary.textContent = "Whole class";
  } else {
    summary.textContent = `${checked.length} student${checked.length>1?'s':''} selected`;
  }
}
function readClassChecks() {
  const items = document.querySelectorAll('#class-checks .class-picker-item');
  const classIds = [];
  const classNames = [];
  const studentTargets = {};
  const studentTargetsHistorical = {};

  items.forEach(item => {
    const classCheck = item.querySelector(".class-check");
    if (!classCheck || !classCheck.checked) return;
    const courseId = classCheck.value;
    classIds.push(courseId);
    classNames.push(classCheck.dataset.name);

    // Are any specific students selected?
    const studentChecks = item.querySelectorAll(".student-check:checked");
    if (studentChecks.length > 0) {
      studentTargets[courseId] = Array.from(studentChecks).map(s => s.value);
      // Save name/email for historical display next time
      studentTargetsHistorical[courseId] = Array.from(studentChecks).map(s => ({
        userId: s.value,
        name:   s.dataset.name,
        email:  s.dataset.email
      }));
    }
  });

  return { classIds, classNames, studentTargets, studentTargetsHistorical };
}

async function commonSaveAndPost(existingId, payload) {
  let docId = existingId;
  if (existingId) {
    await setDoc(doc(db,"assignments",existingId), payload, {merge:true});
  } else {
    payload.createdAt = serverTimestamp();
    const ref = await addDoc(collection(db,"assignments"), payload);
    docId = ref.id;
  }

  if (payload.classIds.length && APPS_SCRIPT_URL && !APPS_SCRIPT_URL.startsWith("REPLACE")) {
    const assignmentUrl = window.location.href.split("?")[0] +`?a=${docId}`;
    try {
      await fetch(APPS_SCRIPT_URL, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({
          action:"postAssignment",
          token:gToken,
          title: payload.title,
          description:`Complete this AI-powered reading assignment: ${assignmentUrl}`,
          url: assignmentUrl,
          classIds: payload.classIds,
          studentTargets: payload.studentTargets || {}
        })
      });
      toast("Published to Google Classroom ✓");
    } catch(e) { toast("Saved, but Classroom post failed.", true); }
  } else {
    toast("Assignment saved ✓");
  }
  renderTeacherHome();
}

async function fetchTeacherClasses() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.startsWith("REPLACE")) return [];

  if (!gToken && role === "teacher") {
    try {
      const { reauthenticateWithPopup } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      const result = await reauthenticateWithPopup(auth.currentUser, gpTeacher);
      gToken = result._tokenResponse?.oauthAccessToken || null;
    } catch(e) {
      toast("Couldn't get Classroom access. " + e.message, true);
      return [];
    }
  }

  try {
    const r = await fetch(`${APPS_SCRIPT_URL}?action=getClasses&token=${encodeURIComponent(gToken||"")}`);
    const j = await r.json();
    return j.classes || [];
  } catch(e) { return []; }
}

// Helper: fetch with timeout to prevent hanging
function fetchWithTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error(`${label} timed out after ${ms}ms`)), ms)
    )
  ]);
}

      <tbody>${rows}</tbody></table>`;

    logDebug("renderAllResponses success", { count: allResponses.length });

  } catch (e) {
    console.error("renderAllResponses error:", e);
    logDebug("renderAllResponses ERROR", e.message);
    $("resp-container").innerHTML = `
      <div class="error-state">
